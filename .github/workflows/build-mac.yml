name: Build & Publish Mac App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest

    env:
      GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies (skip postinstall rebuild)
        run: npm ci --ignore-scripts

      - name: Rebuild native modules for Electron (Mac)
        run: npx @electron/rebuild --force

      - name: Build & Publish Mac .dmg to Releases
        run: npm run build:mac -- --publish always

      - name: Upload Mac Installer as Artifact (local preview)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MicTab-Mac-Installer
          path: |
            dist/*.dmg
            dist/*.zip
            dist/latest-mac.yml
