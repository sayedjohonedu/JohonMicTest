name: Build & Publish Mac App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build & Publish Mac .dmg to Releases
        env:
          # This token must have write access to the PUBLIC juno-voice-releases repo
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: npm run build:mac -- --publish always

      - name: Upload Mac Installer as Artifact (local preview)
        uses: actions/upload-artifact@v4
        with:
          name: Juno-Mac-Installer
          path: |
            dist/*.dmg
            dist/*.zip
            dist/latest-mac.yml
