name: Build & Publish Windows App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build & Publish Windows .exe to Releases
        run: npm run build:win -- --publish always

      - name: Upload Windows Installer as Artifact (local preview)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Juno-Windows-Installer
          path: |
            dist/*.exe
            dist/latest.yml
