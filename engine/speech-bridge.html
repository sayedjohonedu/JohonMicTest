<!DOCTYPE html>
<html>
<head>
    <title>Juno Speech Bridge</title>
</head>
<body>
    <script>
        'use strict';

        // --- State ---
        let ws = null;
        let recognition = null;
        let currentLang = 'en-US';
        let isActive = false;        // Are we supposed to be listening?
        let isRestarting = false;    // Prevent double-starts during restart
        let silenceTimer = null;
        let SILENCE_TIMEOUT_MS = 15000;
        let selectedDeviceId = null; // null = use Chrome default (system default mic)
        
        // --- Web Audio API for Visualizer ---
        let audioCtx = null;
        let analyser = null;
        let gainNode = null;
        let analyserInterval = null;
        let micSensitivity = 1.0;

        // --- WebSocket ---
        function setupWebSocket() {
            const port = new URLSearchParams(window.location.search).get('port') || 9123;
            ws = new WebSocket(`ws://localhost:${port}`);

            ws.onopen = () => {
                ws.send(JSON.stringify({ type: 'status', message: 'ready' }));
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.command === 'start') {
                    if (data.timeout !== undefined) {
                        SILENCE_TIMEOUT_MS = parseInt(data.timeout, 10) * 1000;
                    }
                    startListening(data.language || 'en-US');
                } else if (data.command === 'stop') {
                    stopListening();
                } else if (data.command === 'ping') {
                    if (isActive) armSilenceTimer();
                } else if (data.command === 'get-devices') {
                    // Enumerate audio input devices and send list back
                    enumerateDevices();
                } else if (data.command === 'set-device') {
                    // User picked a mic — store it, mic routing applies on next start
                    selectedDeviceId = data.deviceId || null;
                } else if (data.command === 'set-mic-sensitivity') {
                    micSensitivity = data.sensitivity || 1.0;
                    if (gainNode) {
                        gainNode.gain.value = micSensitivity;
                    }
                }
            };

            ws.onclose = () => {
                setTimeout(setupWebSocket, 2000);
            };
        }

        // --- Silence timer ---
        function armSilenceTimer() {
            clearSilenceTimer();
            if (SILENCE_TIMEOUT_MS <= 0) return; // 0 means infinity/never

            silenceTimer = setTimeout(() => {
                // Configured seconds of silence — stop completely
                ws.send(JSON.stringify({ type: 'status', message: 'silence-timeout' }));
                stopListening();
            }, SILENCE_TIMEOUT_MS);
        }

        function clearSilenceTimer() {
            if (silenceTimer) {
                clearTimeout(silenceTimer);
                silenceTimer = null;
            }
        }

        // --- Device enumeration --------------------------------------------------
        // Works on both macOS and Windows — Chrome has already obtained mic
        // permission by the time this page loads, so device labels are populated.
        function enumerateDevices() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) {
                ws.send(JSON.stringify({ type: 'device-list', devices: [] }));
                return;
            }
            navigator.mediaDevices.enumerateDevices().then(devices => {
                const audioInputs = devices
                    .filter(d => d.kind === 'audioinput')
                    .map(d => ({ id: d.deviceId, label: d.label || `Microphone (${d.deviceId.slice(0,8)})` }));
                ws.send(JSON.stringify({ type: 'device-list', devices: audioInputs }));
            }).catch(() => {
                ws.send(JSON.stringify({ type: 'device-list', devices: [] }));
            });
        }

        // --- Recognition ---
        function createRecognition() {
            const r = new webkitSpeechRecognition();
            r.continuous = true;
            r.interimResults = true; // Send interim for live typing effect in overlay
            r.lang = currentLang;
            r.maxAlternatives = 1;

            r.onresult = (event) => {
                let finalTranscript   = '';
                let interimTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }

                // Only reset the 15s clock if we actually heard words/text (prevents background noise empty results from keeping it alive indefinitely)
                if (interimTranscript.trim() || finalTranscript.trim()) {
                    armSilenceTimer();
                }

                // Always broadcast interim for live waveform/typing effect
                ws.send(JSON.stringify({ type: 'interim-text', text: interimTranscript }));

                if (finalTranscript.trim()) {
                    ws.send(JSON.stringify({ type: 'final-text', text: finalTranscript.trim() }));
                }
            };

            r.onerror = (event) => {
                // 'no-speech' just means silence — not an error, keep counting towards 15s timeout
                if (event.error === 'no-speech') return;
                // All other errors, let onend handle the restart
            };

            r.onend = () => {
                if (!isActive || isRestarting) return;

                // Chrome stopped on its own (timeout, network blip, etc.)
                // We want to be active — restart immediately.
                isRestarting = true;
                setTimeout(() => {
                    if (isActive) {
                        try {
                            recognition = createRecognition();
                            recognition.start();
                            // Do NOT call armSilenceTimer() here. Let the existing timer continue to track 
                            // total contiguous silence, otherwise Chrome's internal timeouts will keep resetting our 15s!
                        } catch (e) {
                            console.error('Restart failed', e);
                        }
                    }
                    isRestarting = false;
                }, 400); // Wait briefly to let Windows release mic lock
            };

            return r;
        }

        // --- Mic routing ---------------------------------------------------------
        // When a specific device is selected, we open a getUserMedia stream on that
        // device before starting recognition. Chrome routes the Web Speech API
        // through whichever mic stream is most recently active, so this effectively
        // forces the recognition to use the chosen device.
        // When selectedDeviceId is null, we skip this entirely — default behaviour.
        let activeStream = null; // Keep reference so we can stop tracks on stopListening

        function setupAnalyser(stream) {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            try {
                const source = audioCtx.createMediaStreamSource(stream);
                gainNode = audioCtx.createGain();
                gainNode.gain.value = micSensitivity;
                
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 64; // results in 32 frequency bins
                
                source.connect(gainNode);
                gainNode.connect(analyser);
                
                if (analyserInterval) clearInterval(analyserInterval);
                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                analyserInterval = setInterval(() => {
                    if (!isActive) return;
                    analyser.getByteFrequencyData(dataArray);
                    
                    // Take the first 16 bins (usually covers human vocal range nicely)
                    const bins = Array.from(dataArray.slice(0, 16));
                    
                    // Simple average volume
                    let sum = 0;
                    for (let i = 0; i < bins.length; i++) sum += bins[i];
                    const volume = bins.length ? (sum / bins.length) : 0;
                    
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        // Sending max 30 times a second to keep IPC relatively quiet
                        ws.send(JSON.stringify({ type: 'audio-data', bins, volume }));
                    }
                }, 1000 / 30);
            } catch (e) {
                console.error("Audio analyser failed:", e);
            }
        }

        function startListeningWithRouting(lang, callback) {
            const constraints = selectedDeviceId ? { audio: { deviceId: { exact: selectedDeviceId } } } : { audio: true };
            // Stop any previous routing stream
            if (activeStream) {
                activeStream.getTracks().forEach(t => t.stop());
                activeStream = null;
            }
            navigator.mediaDevices.getUserMedia(constraints)
                .then(stream => {
                    activeStream = stream;
                    setupAnalyser(stream);
                    callback();
                })
                .catch(() => {
                    // Device unavailable — fall back to default
                    selectedDeviceId = null;
                    callback();
                });
        }

        function startListening(lang) {
            currentLang = lang || currentLang;
            if (isActive) return; // Already listening
            isActive = true;
            isRestarting = false;
            startListeningWithRouting(currentLang, () => {
                recognition = createRecognition();
                recognition.start();
                armSilenceTimer();
            });
        }

        function stopListening() {
            isActive = false;
            isRestarting = false;
            clearSilenceTimer();
            if (analyserInterval) {
                clearInterval(analyserInterval);
                analyserInterval = null;
            }
            if (recognition) {
                try { recognition.stop(); } catch (e) {}
                recognition = null;
            }
            // Release routing stream so the mic indicator light turns off
            if (activeStream) {
                activeStream.getTracks().forEach(t => t.stop());
                activeStream = null;
            }
        }

        // Expose for Puppeteer just in case
        window.startRecognition = startListening;
        window.stopRecognition = stopListening;

        setupWebSocket();
    </script>
</body>
</html>
