<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>License Activated!</title>
<link rel="stylesheet" href="overlay.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    overflow: hidden; user-select: none; -webkit-user-select: none;
    display: flex; justify-content: center; align-items: center;
    height: 100vh; background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  #card {
    position: relative;
    width: 100%; height: 100%;
    padding: 28px 24px 24px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; gap: 16px;
    -webkit-app-region: drag;
    box-shadow: none !important;
    border: 1px solid rgba(124,111,255,0.3) !important;
    border-radius: 16px !important;
    background: rgba(18, 18, 24, 0.98) !important;
    overflow: hidden;
  }

  /* Animated gradient background glow */
  .bg-glow {
    position: absolute; inset: 0; z-index: 0; opacity: 0;
    background: radial-gradient(ellipse at 50% 50%,
      rgba(124,111,255,0.15) 0%,
      rgba(72,199,116,0.08) 50%,
      transparent 80%);
    animation: glowPulse 2s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.05); }
  }

  /* Countdown ring */
  .countdown-ring {
    position: relative; z-index: 1;
    width: 80px; height: 80px; flex-shrink: 0;
  }
  .countdown-ring svg { transform: rotate(-90deg); }
  .countdown-ring .ring-bg {
    fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 4;
  }
  .countdown-ring .ring-progress {
    fill: none; stroke: url(#ringGrad); stroke-width: 4;
    stroke-linecap: round;
    stroke-dasharray: 226.2;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear;
  }
  .countdown-number {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 800; color: #fff;
    text-shadow: 0 0 20px rgba(124,111,255,0.6);
  }

  /* Phases */
  #phase-countdown { transition: opacity 0.4s; }
  #phase-success { display: none; opacity: 0; transition: opacity 0.5s; }

  .success-icon {
    width: 64px; height: 64px; border-radius: 50%;
    background: linear-gradient(135deg, rgba(72,199,116,0.2), rgba(72,199,116,0.05));
    border: 2px solid rgba(72,199,116,0.4);
    display: flex; align-items: center; justify-content: center;
    animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes scaleIn {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .success-check {
    width: 32px; height: 32px; color: #48c774;
    animation: drawCheck 0.6s ease 0.2s both;
  }
  @keyframes drawCheck {
    0% { opacity: 0; transform: scale(0.5) rotate(-10deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  h2 {
    font-size: 18px; color: #fff; font-weight: 700;
    z-index: 1; letter-spacing: -0.3px;
  }
  .sub { font-size: 13px; color: rgba(255,255,255,0.55); z-index: 1; line-height: 1.5; }

  .activating-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(124,111,255,0.12); border: 1px solid rgba(124,111,255,0.3);
    border-radius: 20px; padding: 5px 16px;
    font-size: 12px; font-weight: 600; color: #7c6fff;
    z-index: 1; letter-spacing: 0.5px;
  }

  .pro-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: linear-gradient(135deg, rgba(72,199,116,0.15), rgba(72,199,116,0.05));
    border: 1px solid rgba(72,199,116,0.35);
    border-radius: 20px; padding: 5px 16px;
    font-size: 12.5px; font-weight: 700; color: #48c774;
    letter-spacing: 0.3px;
    animation: fadeUp 0.5s ease 0.3s both;
  }
  @keyframes fadeUp {
    0% { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* Confetti canvas */
  #confetti {
    position: absolute; inset: 0; z-index: 2; pointer-events: none;
  }

  /* Shimmer bars */
  .shimmer-bar {
    position: absolute; z-index: 0; height: 1px; opacity: 0;
    background: linear-gradient(90deg, transparent, rgba(124,111,255,0.4), transparent);
    animation: shimmer 2s ease-in-out infinite;
  }
  .shimmer-bar:nth-child(1) { top: 20%; left: 10%; width: 80%; animation-delay: 0s; }
  .shimmer-bar:nth-child(2) { top: 50%; left: 5%;  width: 90%; animation-delay: 0.7s; }
  .shimmer-bar:nth-child(3) { top: 80%; left: 15%; width: 70%; animation-delay: 1.4s; }
  @keyframes shimmer {
    0%, 100% { opacity: 0; }
    50% { opacity: 0.6; }
  }

  /* Floating particles */
  .particle {
    position: absolute; border-radius: 50%; z-index: 0;
    pointer-events: none; opacity: 0;
  }
  .particle:nth-child(1) { width: 4px; height: 4px; background: #7c6fff; top: 15%; left: 20%; animation: float 3s ease-in-out infinite; }
  .particle:nth-child(2) { width: 3px; height: 3px; background: #48c774; top: 70%; left: 75%; animation: float 4s ease-in-out 0.5s infinite; }
  .particle:nth-child(3) { width: 5px; height: 5px; background: #ffd93d; top: 30%; left: 80%; animation: float 3.5s ease-in-out 1s infinite; }
  .particle:nth-child(4) { width: 3px; height: 3px; background: #ff6b6b; top: 80%; left: 15%; animation: float 2.8s ease-in-out 0.3s infinite; }
  @keyframes float {
    0%, 100% { opacity: 0; transform: translateY(0) scale(0.8); }
    50% { opacity: 0.7; transform: translateY(-15px) scale(1.2); }
  }
</style>
</head>
<body>
<div id="card">
  <!-- Decorative elements -->
  <div class="bg-glow"></div>
  <div class="shimmer-bar"></div>
  <div class="shimmer-bar"></div>
  <div class="shimmer-bar"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>

  <!-- Phase 1: Countdown -->
  <div id="phase-countdown">
    <div class="countdown-ring">
      <svg width="80" height="80" viewBox="0 0 80 80">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#7c6fff"/>
            <stop offset="100%" stop-color="#48c774"/>
          </linearGradient>
        </defs>
        <circle class="ring-bg" cx="40" cy="40" r="36"/>
        <circle class="ring-progress" id="ring" cx="40" cy="40" r="36"/>
      </svg>
      <div class="countdown-number" id="countdown-num">3</div>
    </div>
    <h2>Activating License</h2>
    <div class="activating-badge">✦ Unlocking Pro Features</div>
    <p class="sub">Setting up unlimited access...</p>
  </div>

  <!-- Phase 2: Success -->
  <div id="phase-success">
    <div class="success-icon">
      <svg class="success-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h2 style="color:#48c774;">✦ Pro Unlocked!</h2>
    <div class="pro-badge">⭐ Unlimited Dictation Activated</div>
    <p class="sub">Thank you for supporting MicTab!</p>
  </div>

  <canvas id="confetti"></canvas>
</div>

<script>
  const TOTAL_SECONDS = 3;
  const circumference = 2 * Math.PI * 36; // r=36
  const ring = document.getElementById('ring');
  const numEl = document.getElementById('countdown-num');
  const phaseCountdown = document.getElementById('phase-countdown');
  const phaseSuccess = document.getElementById('phase-success');
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');

  // Resize canvas
  function resizeCanvas() {
    canvas.width = canvas.parentElement.clientWidth;
    canvas.height = canvas.parentElement.clientHeight;
  }
  resizeCanvas();

  let remaining = TOTAL_SECONDS;

  // Animate ring
  function updateRing(frac) {
    ring.style.strokeDashoffset = circumference * frac;
  }
  ring.style.strokeDasharray = circumference;
  updateRing(0);

  // Smooth countdown with requestAnimationFrame
  const startTime = Date.now();
  const totalMs = TOTAL_SECONDS * 1000;

  function animateCountdown() {
    const elapsed = Date.now() - startTime;
    const frac = Math.min(elapsed / totalMs, 1);
    updateRing(frac);

    const secsLeft = Math.ceil(TOTAL_SECONDS - (elapsed / 1000));
    if (secsLeft !== remaining && secsLeft >= 0) {
      remaining = secsLeft;
      numEl.textContent = secsLeft || '✓';
      numEl.style.transform = 'scale(1.3)';
      setTimeout(() => numEl.style.transform = 'scale(1)', 150);
    }

    if (frac < 1) {
      requestAnimationFrame(animateCountdown);
    } else {
      showSuccess();
    }
  }
  requestAnimationFrame(animateCountdown);

  function showSuccess() {
    phaseCountdown.style.opacity = '0';
    setTimeout(() => {
      phaseCountdown.style.display = 'none';
      phaseSuccess.style.display = 'flex';
      phaseSuccess.style.flexDirection = 'column';
      phaseSuccess.style.alignItems = 'center';
      phaseSuccess.style.gap = '14px';
      requestAnimationFrame(() => phaseSuccess.style.opacity = '1');
      launchConfetti();

      // Auto-close after 2.5 seconds
      setTimeout(() => {
        if (window.junoAPI && window.junoAPI.closeLicenseCelebration) {
          window.junoAPI.closeLicenseCelebration();
        }
      }, 2500);
    }, 400);
  }

  // ── Confetti ────────────────────────────
  const confettiPieces = [];
  const COLORS = ['#7c6fff', '#48c774', '#ffd93d', '#ff6b6b', '#00d2ff', '#ff71ce', '#fff'];

  function createConfettiPiece() {
    return {
      x: canvas.width * Math.random(),
      y: -10 - Math.random() * 30,
      w: 4 + Math.random() * 4,
      h: 6 + Math.random() * 8,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      vx: (Math.random() - 0.5) * 3,
      vy: 1.5 + Math.random() * 3,
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.15,
      opacity: 1,
      decay: 0.003 + Math.random() * 0.005,
    };
  }

  function launchConfetti() {
    for (let i = 0; i < 60; i++) {
      confettiPieces.push(createConfettiPiece());
    }
    // Second burst after small delay
    setTimeout(() => {
      for (let i = 0; i < 30; i++) confettiPieces.push(createConfettiPiece());
    }, 400);
    animateConfetti();
  }

  function animateConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = confettiPieces.length - 1; i >= 0; i--) {
      const p = confettiPieces[i];
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.rotSpeed;
      p.vy += 0.04; // gravity
      p.opacity -= p.decay;

      if (p.opacity <= 0 || p.y > canvas.height + 20) {
        confettiPieces.splice(i, 1);
        continue;
      }

      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.globalAlpha = Math.max(0, p.opacity);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    }
    if (confettiPieces.length > 0) {
      requestAnimationFrame(animateConfetti);
    }
  }
</script>
</body>
</html>
