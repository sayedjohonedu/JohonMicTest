<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>AI Trial Expired</title>
<link rel="stylesheet" href="overlay.css">
<style>
  body {
    margin: 0; overflow: hidden; user-select: none; -webkit-user-select: none;
    display: flex; justify-content: center; align-items: center; height: 100vh;
  }
  #card {
    position: relative;
    width: 100%; height: 100%; box-sizing: border-box;
    padding: 24px 22px 20px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; gap: 14px; -webkit-app-region: drag;
    box-shadow: none !important;
    border: 1px solid rgba(255,255,255,0.1) !important;
    border-radius: 14px !important;
    background: rgba(22, 22, 28, 0.98) !important;
  }
  .icon-ring {
    width: 50px; height: 50px; border-radius: 50%;
    background: rgba(124, 111, 255, 0.15);
    border: 1px solid rgba(124, 111, 255, 0.3);
    display: flex; justify-content: center; align-items: center;
    color: #7C6FFF; flex-shrink: 0;
  }
  h2 { margin: 0; font-size: 17px; color: #fff; font-weight: 700; }
  p  { margin: 0; font-size: 12.5px; color: rgba(255,255,255,0.65); line-height: 1.55; }
  .trial-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(124,111,255,0.1); border: 1px solid rgba(124,111,255,0.25);
    border-radius: 20px; padding: 5px 14px;
    font-size: 12px; font-weight: 600; color: #7C6FFF;
  }
  .btn-row {
    display: flex; gap: 9px; width: 100%; margin-top: 4px;
    -webkit-app-region: no-drag;
  }
  button {
    flex: 1; padding: 9px 10px; border: none; border-radius: 8px;
    font-size: 12.5px; font-weight: 600; cursor: pointer; transition: all 0.18s;
  }
  .btn-license {
    background: linear-gradient(135deg, #7C6FFF, #6C63FF);
    color: #fff; box-shadow: 0 2px 10px rgba(108,99,255,0.4);
  }
  .btn-license:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(108,99,255,0.55); }
  .btn-close {
    background: rgba(255,255,255,0.09); color: rgba(255,255,255,0.8);
    border: 1px solid rgba(255,255,255,0.15);
  }
  .btn-close:hover { background: rgba(255,255,255,0.14); }
</style>
</head>
<body>
<div id="card">
  <div class="icon-ring">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2a4 4 0 0 0-4 4v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2h-2V6a4 4 0 0 0-4-4z"/>
      <circle cx="12" cy="15" r="1.5"/>
      <line x1="12" y1="16.5" x2="12" y2="18"/>
    </svg>
  </div>
  <h2>AI Trial Expired</h2>

  <div class="trial-badge">15-day free trial ended</div>

  <p>Your free AI Dictation trial has ended. To continue using AI-powered dictation, please activate a license key.</p>

  <div class="btn-row">
    <button class="btn-close" id="btn-close">Close</button>
    <button class="btn-license" id="btn-license">Get License Key</button>
  </div>
</div>
<script>
  document.getElementById('btn-license').addEventListener('click', () => {
    window.junoAPI.openUrl('https://johonsayed.gumroad.com/l/JunoverseAI-Dictation');
  });
  document.getElementById('btn-close').addEventListener('click', () => {
    window.junoAPI.closeAiTrialPopup();
  });
</script>
</body>
</html>
