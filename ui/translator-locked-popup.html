<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Translator Locked</title>
<link rel="stylesheet" href="overlay.css">
<style>
  body {
    margin: 0; overflow: hidden; user-select: none; -webkit-user-select: none;
    display: flex; justify-content: center; align-items: center; height: 100vh;
  }
  #card {
    position: relative;
    width: 100%; height: 100%; box-sizing: border-box;
    padding: 24px 22px 20px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; gap: 14px; -webkit-app-region: drag;
    box-shadow: none !important;
    border: 1px solid rgba(255,255,255,0.1) !important;
    border-radius: 14px !important;
    background: rgba(22, 22, 28, 0.98) !important;
  }
  .icon-ring {
    width: 52px; height: 52px; border-radius: 50%;
    background: rgba(108, 99, 255, 0.12);
    border: 1px solid rgba(108, 99, 255, 0.3);
    display: flex; justify-content: center; align-items: center;
    color: var(--accent, #7C6FFF); flex-shrink: 0;
  }
  h2 { margin: 0; font-size: 17px; color: #fff; font-weight: 700; }
  p  { margin: 0; font-size: 12.5px; color: rgba(255,255,255,0.62); line-height: 1.55; }
  .feature-list {
    width: 100%; text-align: left;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 9px; padding: 12px 14px; display: flex; flex-direction: column; gap: 7px;
  }
  .feat { display: flex; align-items: center; gap: 8px; font-size: 12px; color: rgba(255,255,255,0.7); }
  .feat-icon { color: #7C6FFF; flex-shrink: 0; }
  .btn-row {
    display: flex; gap: 9px; width: 100%; margin-top: 3px;
    -webkit-app-region: no-drag;
  }
  button {
    flex: 1; padding: 9px 10px; border: none; border-radius: 8px;
    font-size: 12.5px; font-weight: 600; cursor: pointer; transition: all 0.18s;
  }
  .btn-license {
    background: linear-gradient(135deg, #7C6FFF, #6C63FF);
    color: #fff; box-shadow: 0 2px 10px rgba(108,99,255,0.4);
  }
  .btn-license:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(108,99,255,0.55); }
  .top-close {
    position: absolute; top: 10px; right: 10px; width: 26px; height: 26px;
    background: transparent; border: none; color: rgba(255,255,255,0.4);
    cursor: pointer; border-radius: 4px; display: flex; align-items: center; justify-content: center;
    -webkit-app-region: no-drag; transition: all 0.2s; padding: 0;
  }
  .top-close:hover { background: rgba(255,255,255,0.1); color: #fff; }
</style>
</head>
<body>
<div id="card">
  <button class="top-close" id="top-close" title="Close">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="6" x2="6" y2="18"></line>
      <line x1="6" y1="6" x2="18" y2="18"></line>
    </svg>
  </button>

  <div class="icon-ring">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>
  <h2>Translator Locked</h2>
  <p>The AI Translator is a <strong style="color:#fff;">premium feature</strong>. Upgrade your license to access real-time translation.</p>

  <div class="feature-list">
    <div class="feat">
      <span class="feat-icon">✓</span> Unlimited voice dictation
    </div>
    <div class="feat">
      <span class="feat-icon">✓</span> Real-time AI translation
    </div>
    <div class="feat">
      <span class="feat-icon">✓</span> All languages unlocked
    </div>
  </div>

  <div class="btn-row">
    <button class="btn-license" id="btn-license">Collect License</button>
  </div>
</div>
<script>
  document.getElementById('btn-license').addEventListener('click', () => {
    window.junoAPI.openUrl('https://johonsayed.gumroad.com/l/JunoverseAI-Dictation');
  });
  document.getElementById('top-close').addEventListener('click', () => {
    window.junoAPI.closeTranslatorLockedPopup();
  });
</script>
</body>
</html>
