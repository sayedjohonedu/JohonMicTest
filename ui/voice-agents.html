<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Agents — MicTab</title>
  <meta name="description" content="Configure custom AI voice agents with trigger words, context blocks, and prompt pipelines.">
  <link rel="stylesheet" href="voice-agents.css">
</head>
<body>

  <!-- ── Header ────────────────────────────────────────── -->
  <div class="header">
    <h1>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
      Voice <span>Agents</span>
    </h1>

    <!-- Jarvis pill — always in header -->
    <div class="jarvis-pill" id="jarvis-pill">
      <button class="jarvis-pill-name" id="jarvis-peek-btn" title="Click to peek at Jarvis config">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg>
        Jarvis
      </button>
      <label class="mini-toggle" id="jarvis-toggle-wrap" title="Enable / disable Jarvis">
        <input type="checkbox" id="jarvis-toggle">
        <span class="track"></span>
      </label>
    </div>

    <button class="header-btn" id="btn-close" title="Close">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <!-- ── Main Layout ───────────────────────────────────── -->
  <div class="main-layout">

    <!-- ══ HOME VIEW ══════════════════════════════════════ -->
    <div id="home-view" class="home-view">

      <!-- Home top bar -->
      <div class="home-topbar">
        <h2 class="home-title">My Agents</h2>
        <button class="btn-add-home" id="btn-add-agent" title="New Agent">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          New Agent
        </button>
      </div>

      <!-- Cards grid -->
      <div class="home-grid" id="agent-list"></div>

      <!-- Empty home state -->
      <div class="home-empty" id="home-empty" style="display:none;">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.3"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
        <p>No agents yet</p>
        <span>Click <strong>+ New Agent</strong> to create your first voice agent</span>
      </div>
    </div>

    <!-- ══ EDITOR VIEW ═════════════════════════════════════ -->
    <div id="editor-view" class="editor-view" style="display:none;">

      <!-- Editor back button + top bar -->
      <div class="editor-top">
        <button class="editor-back-btn" id="btn-back" title="Back to home">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        </button>
        <input type="text" id="agent-name" placeholder="Agent Name" spellcheck="false">
        <span class="trigger-badge" id="trigger-badge">trigger: —</span>
        <input type="text" id="agent-trigger" placeholder="Trigger words (comma-separated)" spellcheck="false" style="width:180px;">
        <select id="agent-profile" title="LLM Profile" style="display:none;">
          <option value="">Vault Default</option>
        </select>
        <button class="btn-delete-agent" id="btn-delete" title="Delete Agent">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
        </button>
        <button class="btn-reset-jarvis" id="btn-reset-jarvis" title="Reset Jarvis to defaults" style="display:none;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          Reset
        </button>
      </div>

      <!-- Canvas + Palette -->
      <div class="canvas-area" id="canvas-area">
        <!-- Scrollable viewport -->
        <div id="canvas-viewport">
          <div class="block-canvas" id="block-canvas"></div>
        </div>

        <div class="palette">
          <div class="palette-title">Blocks</div>
          <div class="palette-item" data-type="user-prompt" title="Add instruction / system prompt block">
            <div class="p-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            </div> User Prompt
          </div>
          <div class="palette-item" data-type="context" title="Add the spoken text block">
            <div class="p-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>
            </div> Context
          </div>
          <div class="palette-item" data-type="clipboard" title="Inject clipboard content when keywords detected">
            <div class="p-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="4" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-1"></path><rect x="5" y="15" width="14" height="7" rx="2"></rect></svg>
            </div> Clipboard
          </div>
          <div class="palette-item" data-type="selected-text" title="Read the currently highlighted text">
            <div class="p-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </div> Selected Text
          </div>
          <div class="palette-item" data-type="datetime" title="Inject current date and time">
            <div class="p-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            </div> Date / Time
          </div>
          <div class="palette-item" data-type="http-request" title="Fetch data from any URL and inject the response">
            <div class="p-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            </div> HTTP Request
          </div>
          <div class="palette-item" data-type="active-window" title="OCR-read the current screen and inject the text">
            <div class="p-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            </div> Active Window
          </div>
          <div class="palette-item" data-type="shell-command" title="Run a terminal command and inject its output">
            <div class="p-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
            </div> Shell Command
          </div>
          <div class="palette-item" data-type="file-system" title="Read a local file and inject its content">
            <div class="p-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            </div> File
          </div>
          <div class="palette-item palette-item-js" data-type="javascript" title="Run sandboxed JS — click to enable (security warning)">
            <div class="p-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
            </div> JavaScript <span style="font-size:9px; color:#f59e0b; margin-left:auto;">⚠</span>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="voice-agents.js"></script>
</body>
</html>
