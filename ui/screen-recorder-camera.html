<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Camera</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
    user-select: none; -webkit-user-select: none;
  }

  /* ── Camera feed fills entire window ── */
  #cam-feed {
    width: 100%; height: 100%;
    position: relative;
    border-radius: var(--radius, 16px);
    overflow: hidden;
    border: 2px solid rgba(99,102,241,0.45);
    transition: border-radius 0.25s ease;
    -webkit-app-region: drag;
    cursor: grab;
  }
  #cam-feed:active { cursor: grabbing; }

  #cam-video {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    transform-origin: center center;
    transition: transform 0.15s ease;
  }

  /* No camera */
  #no-cam {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 6px;
    background: rgba(10,10,18,0.95);
    color: rgba(255,255,255,0.3); font: 500 11px 'Inter', sans-serif;
    text-align: center; padding: 12px;
  }

  /* ── Floating controls overlay (auto-hides) ── */
  #controls {
    position: fixed; bottom: 6px; left: 6px; right: 6px;
    display: flex; align-items: center; gap: 4px;
    padding: 5px 8px;
    background: rgba(10,10,18,0.88);
    backdrop-filter: blur(16px);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.06);
    -webkit-app-region: no-drag;
    flex-wrap: wrap;
    justify-content: center;
    z-index: 20;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.25s ease, transform 0.25s ease;
    pointer-events: none;
  }
  #controls.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .ctrl {
    display: flex; align-items: center; gap: 3px;
    padding: 4px 8px; border-radius: 5px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
    color: #b0b5c0; font: 500 9px/1 'Inter', -apple-system, sans-serif;
    cursor: pointer; transition: all 0.12s; white-space: nowrap;
    -webkit-app-region: no-drag;
  }
  .ctrl:hover { background: rgba(255,255,255,0.12); color: #fff; }
  .ctrl.active { background: rgba(99,102,241,0.22); border-color: rgba(99,102,241,0.45); color: #a5b4fc; }

  .ctrl-sep { width: 1px; height: 14px; background: rgba(255,255,255,0.06); }

  /* Zoom slider */
  #zoom-slider {
    width: 50px; height: 3px; -webkit-appearance: none; appearance: none;
    background: rgba(255,255,255,0.12); border-radius: 2px; cursor: pointer;
    -webkit-app-region: no-drag;
  }
  #zoom-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 10px; height: 10px;
    border-radius: 50%; background: #a5b4fc; border: 2px solid rgba(10,10,18,0.8);
    cursor: pointer;
  }
  .zoom-label { font: 500 8px/1 'Inter', sans-serif; color: #6b7280; white-space: nowrap; }

  /* Camera select */
  #cam-select {
    height: 22px; padding: 0 4px; border-radius: 5px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
    color: #b0b5c0; font: 500 9px 'Inter', sans-serif; cursor: pointer;
    max-width: 90px; -webkit-app-region: no-drag;
  }
</style>
</head>
<body>

<div id="cam-feed">
  <video id="cam-video" autoplay muted playsinline></video>
  <div id="no-cam" style="display:none;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/>
      <line x1="1" y1="1" x2="23" y2="23"/>
    </svg>
    No camera
  </div>
</div>

<!-- Floating controls overlay -->
<div id="controls">
  <button class="ctrl active" id="btn-rect">
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/></svg>
    Rect
  </button>
  <button class="ctrl" id="btn-circle">
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>
    Circle
  </button>

  <div class="ctrl-sep"></div>

  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2" style="flex-shrink:0"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
  <input type="range" id="zoom-slider" min="100" max="300" value="130" step="5">
  <span class="zoom-label" id="zoom-val">130%</span>

  <div class="ctrl-sep"></div>

  <select id="cam-select"></select>

  <div class="ctrl-sep"></div>

  <button class="ctrl" id="btn-close" title="Remove camera">
    <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
  </button>
</div>

<script>
'use strict';

const camVideo   = document.getElementById('cam-video');
const camFeed    = document.getElementById('cam-feed');
const noCamEl    = document.getElementById('no-cam');
const camSelect  = document.getElementById('cam-select');
const btnRect    = document.getElementById('btn-rect');
const btnCircle  = document.getElementById('btn-circle');
const btnClose   = document.getElementById('btn-close');
const zoomSlider = document.getElementById('zoom-slider');
const zoomVal    = document.getElementById('zoom-val');
const controlsEl = document.getElementById('controls');

let currentStream = null;
let currentShape  = 'rect';
let zoomLevel     = 130;

/* ── Load saved preferences ── */
try {
  const saved = JSON.parse(localStorage.getItem('srec-cam-prefs') || '{}');
  if (saved.zoom) zoomLevel = saved.zoom;
  if (saved.shape) currentShape = saved.shape;
} catch (_) {}

function savePrefs() {
  localStorage.setItem('srec-cam-prefs', JSON.stringify({ zoom: zoomLevel, shape: currentShape }));
}

/* ── Auto-hide controls ── */
let hideTimer = null;
function showControls() {
  controlsEl.classList.add('visible');
  clearTimeout(hideTimer);
  hideTimer = setTimeout(() => controlsEl.classList.remove('visible'), 5000);
}
// Show on any mouse movement over the window
document.addEventListener('mousemove', showControls);
document.addEventListener('mouseenter', showControls);
// Keep visible while interacting with controls
controlsEl.addEventListener('mouseenter', () => { clearTimeout(hideTimer); controlsEl.classList.add('visible'); });
controlsEl.addEventListener('mouseleave', () => { hideTimer = setTimeout(() => controlsEl.classList.remove('visible'), 3000); });
// Show initially for 5 seconds
showControls();

/* ── Zoom ── */
function applyZoom() {
  const scale = zoomLevel / 100;
  camVideo.style.transform = `scaleX(-1) scale(${scale})`;
  zoomSlider.value = zoomLevel;
  zoomVal.textContent = zoomLevel + '%';
}
zoomSlider.addEventListener('input', () => { zoomLevel = parseInt(zoomSlider.value); applyZoom(); savePrefs(); });

/* ── Shape ── */
function setShape(shape) {
  currentShape = shape;
  if (shape === 'circle') {
    camFeed.style.borderRadius = '50%';
    btnCircle.classList.add('active'); btnRect.classList.remove('active');
  } else {
    camFeed.style.borderRadius = '16px';
    btnRect.classList.add('active'); btnCircle.classList.remove('active');
  }
  savePrefs();
}

/* ── Start camera ── */
async function startCamera(deviceId) {
  if (currentStream) { currentStream.getTracks().forEach(t => t.stop()); currentStream = null; }
  const constraints = { video: { width: { ideal: 1920 }, height: { ideal: 1080 }, facingMode: 'user' } };
  if (deviceId) constraints.video.deviceId = { exact: deviceId };
  try {
    currentStream = await navigator.mediaDevices.getUserMedia(constraints);
    camVideo.srcObject = currentStream;
    noCamEl.style.display = 'none';
    camVideo.style.display = 'block';
  } catch (err) {
    console.error('[Camera]', err);
    camVideo.style.display = 'none';
    noCamEl.style.display = 'flex';
  }
}

/* ── Populate cameras ── */
async function populateCameras() {
  try {
    await navigator.mediaDevices.getUserMedia({ video: true });
    const devices = await navigator.mediaDevices.enumerateDevices();
    const videoDevs = devices.filter(d => d.kind === 'videoinput');
    camSelect.innerHTML = '';
    videoDevs.forEach((dev, i) => {
      const opt = document.createElement('option');
      opt.value = dev.deviceId;
      opt.textContent = dev.label || `Camera ${i + 1}`;
      camSelect.appendChild(opt);
    });
    if (videoDevs.length) await startCamera(videoDevs[0].deviceId);
  } catch (err) {
    noCamEl.style.display = 'flex'; camVideo.style.display = 'none';
  }
}

/* ── Events ── */
btnRect.addEventListener('click', () => setShape('rect'));
btnCircle.addEventListener('click', () => setShape('circle'));
camSelect.addEventListener('change', () => startCamera(camSelect.value));
btnClose.addEventListener('click', () => {
  if (currentStream) currentStream.getTracks().forEach(t => t.stop());
  window.srecCamera.close();
});

/* ── Init ── */
applyZoom();
setShape(currentShape);
populateCameras();
</script>
</body>
</html>
