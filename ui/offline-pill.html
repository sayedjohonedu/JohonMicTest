<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Offline Dictation</title>
  <link rel="stylesheet" href="offline-pill.css">
</head>
<body>
  <div id="pill">
    <div id="dot-close" title="Cancel"></div>
    <div id="pulse-dot"></div>
    <span id="ai-badge" title="AI Polish active">✦</span>
    <span id="status-icon"></span>
    <span id="status-text">Hold to record…</span>
    <div id="mini-wave-wrap"><canvas id="mini-wave"></canvas></div>
  </div>
  <script src="offline-pill.js"></script>
</body>
</html>
