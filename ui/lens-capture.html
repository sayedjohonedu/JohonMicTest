<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MicTab Lens — Select Region</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; cursor: crosshair; user-select: none; -webkit-user-select: none; -webkit-app-region: no-drag; background: transparent; }
  #bg { position: fixed; inset: 0; object-fit: cover; width: 100%; height: 100%; }
  #canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 10; }

  /* ── Action Hub ── */
  #tip {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 20; pointer-events: none;
    padding: 24px 28px;
    background: rgba(18,18,28,0.95); backdrop-filter: blur(32px) saturate(180%);
    border: 1px solid rgba(124,111,255,0.12); border-radius: 20px;
    color: #e2e2e8; font: 500 13px/1.5 'Inter', -apple-system, sans-serif;
    text-align: center;
    transition: opacity 0.2s ease;
    box-shadow: 0 16px 56px rgba(0,0,0,0.55), 0 0 0 1px rgba(124,111,255,0.04) inset;
    min-width: 400px;
  }

  .hub-title {
    font: 700 16px/1 'Inter', sans-serif; color: #f4f4fa;
    margin-bottom: 18px; letter-spacing: 0.3px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .hub-title svg { opacity: 0.6; color: #a5b4fc; }

  /* Sections */
  .hub-section {
    margin-bottom: 14px; padding: 12px 14px;
    background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px; pointer-events: auto;
  }
  .hub-section:last-child { margin-bottom: 0; }

  .section-label {
    font: 600 10px/1 'Inter', sans-serif; color: rgba(124,111,255,0.7);
    text-transform: uppercase; letter-spacing: 1.2px;
    margin-bottom: 10px; display: flex; align-items: center; gap: 5px;
  }
  .section-label svg { opacity: 0.6; }

  .section-row {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    justify-content: center;
  }

  /* Buttons */
  .hub-btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 8px 14px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: #c8cdd5; font: 500 11px/1 'Inter', -apple-system, sans-serif;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .hub-btn:hover { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.18); }
  .hub-btn:active { transform: scale(0.96); }
  .hub-btn svg { flex-shrink: 0; }

  /* Screenshot accent (indigo/blue) */
  .hub-btn.ss { background: rgba(124,111,255,0.1); border-color: rgba(124,111,255,0.28); color: #b4a8ff; }
  .hub-btn.ss:hover { background: rgba(124,111,255,0.2); border-color: rgba(124,111,255,0.45); color: #d0c8ff; }

  /* Record accent (red) */
  .hub-btn.rec { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.28); color: #f87171; }
  .hub-btn.rec:hover { background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.45); color: #fca5a5; }

  .hub-sep { width: 1px; height: 20px; background: rgba(255,255,255,0.06); flex-shrink: 0; }

  /* Quality & camera toggles */
  .hub-select {
    height: 28px; padding: 0 10px; border-radius: 8px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
    color: #b0b5c0; font: 500 10px 'Inter', sans-serif; cursor: pointer;
    outline: none;
  }
  .hub-select:focus { border-color: rgba(124,111,255,0.4); }
  .hub-toggle {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 6px 12px; border-radius: 8px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
    color: #6b7280; font: 500 10px/1 'Inter', sans-serif; cursor: pointer;
    transition: all 0.15s;
  }
  .hub-toggle.on { background: rgba(124,111,255,0.15); border-color: rgba(124,111,255,0.35); color: #b4a8ff; }
  .hub-toggle:hover { background: rgba(255,255,255,0.08); color: #c0c5d0; }
  .hub-toggle.on:hover { background: rgba(124,111,255,0.25); color: #d0c8ff; }

  /* Escape hint */
  .esc-hint {
    margin-top: 12px; color: #4b5563; font: 500 10px/1 'Inter', sans-serif;
    display: flex; align-items: center; justify-content: center; gap: 4px;
    pointer-events: auto;
  }
  kbd { display: inline-block; padding: 2px 6px; border-radius: 5px; background: rgba(124,111,255,0.08); font-size: 10px; border: 1px solid rgba(124,111,255,0.12); color: #7c6fff; font-weight: 600; }

  /* Size indicator while dragging */
  #size-label {
    position: fixed; z-index: 20; pointer-events: none;
    padding: 4px 10px; border-radius: 6px;
    background: rgba(15,15,20,0.85); backdrop-filter: blur(8px);
    color: #b4a8ff; font: 600 11px/1 'SF Mono', 'Menlo', monospace;
    display: none;
  }
</style>
</head>
<body>
  <img id="bg">
  <canvas id="canvas"></canvas>

  <div id="tip">
    <div class="hub-title">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      MicTab Lens
    </div>

    <!-- ═══ SCREENSHOT SECTION ═══ -->
    <div class="hub-section">
      <div class="section-label">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
        Screenshot
      </div>
      <div class="section-row">
        <button class="hub-btn ss" id="btn-ss-hint" title="Drag on the screen to select a region">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
          Drag to Select Region
        </button>
        <div class="hub-sep"></div>
        <button class="hub-btn ss" id="btn-ss-full" title="Capture the entire screen">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
          Full Screen
        </button>
      </div>
    </div>

    <!-- ═══ SCREEN RECORDING SECTION ═══ -->
    <div class="hub-section">
      <div class="section-label">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor" stroke="none"><circle cx="12" cy="12" r="6"/></svg>
        Screen Recording
      </div>
      <div class="section-row" style="margin-bottom: 8px;">
        <button class="hub-btn rec" id="btn-rec-region" title="Drag to select recording area">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
          Record Region
        </button>
        <div class="hub-sep"></div>
        <button class="hub-btn rec" id="btn-rec-full" title="Record the full screen">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
          Record Full Screen
        </button>
      </div>
      <div class="section-row" style="margin-bottom: 8px;">
        <!-- Quality -->
        <select class="hub-select" id="rec-quality" title="Recording quality">
          <option value="high">High Quality</option>
          <option value="mid">Medium</option>
          <option value="low">Low (small file)</option>
        </select>
        <div class="hub-sep"></div>
        <!-- Camera toggle -->
        <button class="hub-toggle" id="rec-cam-toggle" title="Start with camera overlay">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
          Camera Off
        </button>
      </div>
      <div class="section-row">
        <!-- Mic toggle -->
        <button class="hub-toggle" id="rec-mic-toggle" title="Record microphone audio">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          Mic Off
        </button>
        <div class="hub-sep"></div>
        <!-- Mic device -->
        <select class="hub-select" id="rec-mic-select" title="Microphone device" style="max-width:130px;" disabled>
          <option>No mic</option>
        </select>
        <div class="hub-sep"></div>
        <!-- System audio -->
        <button class="hub-toggle" id="rec-sys-audio" title="Record system/desktop audio (requires virtual audio driver on macOS)">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
          System Audio
        </button>
      </div>
    </div>

    <!-- ═══ GALLERY SECTION ═══ -->
    <div class="hub-section">
      <div class="section-row">
        <button class="hub-btn" id="btn-gallery" title="Open Media Gallery" style="background:rgba(74,222,128,0.08);border-color:rgba(74,222,128,0.25);color:#86efac;width:100%;justify-content:center;">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Media Gallery
        </button>
      </div>
    </div>

    <div class="esc-hint"><kbd>Esc</kbd> cancel</div>
  </div>

  <div id="size-label"></div>

<script>
'use strict';

const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const tip    = document.getElementById('tip');
const sizeLabel = document.getElementById('size-label');
let isDragging = false;
let startX = 0, startY = 0;
let currentX = 0, currentY = 0;

/* ── Load saved prefs ── */
let cameraOn   = false;
let quality    = 'high';
let micOn      = false;
let micDeviceId = '';
let sysAudioOn = false;
try {
  const saved = JSON.parse(localStorage.getItem('srec-capture-prefs') || '{}');
  if ('quality' in saved)       quality = saved.quality;

  if ('cameraOn' in saved)      cameraOn = saved.cameraOn;
  if ('micOn' in saved)         micOn = saved.micOn;
  if ('micDeviceId' in saved)   micDeviceId = saved.micDeviceId;
  if ('sysAudioOn' in saved)    sysAudioOn = saved.sysAudioOn;
} catch (_) {}

function savePrefs() {
  localStorage.setItem('srec-capture-prefs', JSON.stringify({ quality, cameraOn, micOn, micDeviceId, sysAudioOn }));
}

function getSettings() {
  return { quality, outputFormat: 'webm', cameraOn, micOn, micDeviceId, sysAudioOn };
}

/* ── DOM refs ── */
const qualitySelect = document.getElementById('rec-quality');

const camToggle     = document.getElementById('rec-cam-toggle');
const micToggle     = document.getElementById('rec-mic-toggle');
const micSelect     = document.getElementById('rec-mic-select');
const sysAudioBtn   = document.getElementById('rec-sys-audio');

const camSvg = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>`;
const micSvg = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>`;
const micOffSvg = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2c0 .76-.13 1.49-.35 2.17"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>`;
const spkSvg = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>`;

/* ── Init controls ── */
qualitySelect.value = quality;

function updateCamToggle() {
  camToggle.classList.toggle('on', cameraOn);
  camToggle.innerHTML = camSvg + (cameraOn ? ' Camera On' : ' Camera Off');
}

function updateMicToggle() {
  micToggle.classList.toggle('on', micOn);
  micToggle.innerHTML = (micOn ? micSvg : micOffSvg) + (micOn ? ' Mic On' : ' Mic Off');
  micSelect.disabled = !micOn;
}

function updateSysAudioBtn() {
  sysAudioBtn.classList.toggle('on', sysAudioOn);
  sysAudioBtn.innerHTML = spkSvg + (sysAudioOn ? ' System Audio On' : ' System Audio');
}

updateCamToggle();
updateMicToggle();
updateSysAudioBtn();

qualitySelect.addEventListener('change', () => { quality = qualitySelect.value; savePrefs(); });

camToggle.addEventListener('click', () => { cameraOn = !cameraOn; updateCamToggle(); savePrefs(); });
micToggle.addEventListener('click', () => { micOn = !micOn; updateMicToggle(); savePrefs(); });
sysAudioBtn.addEventListener('click', () => { sysAudioOn = !sysAudioOn; updateSysAudioBtn(); savePrefs(); });
micSelect.addEventListener('change', () => { micDeviceId = micSelect.value; savePrefs(); });

/* ── Populate microphone list ── */
async function populateMics() {
  try {
    // Need permission first to get labels
    await navigator.mediaDevices.getUserMedia({ audio: true }).then(s => s.getTracks().forEach(t => t.stop()));
    const devices = await navigator.mediaDevices.enumerateDevices();
    const audioDevs = devices.filter(d => d.kind === 'audioinput');
    micSelect.innerHTML = '';
    audioDevs.forEach((dev, i) => {
      const opt = document.createElement('option');
      opt.value = dev.deviceId;
      opt.textContent = dev.label || `Microphone ${i + 1}`;
      micSelect.appendChild(opt);
    });
    // Restore saved device
    if (micDeviceId && audioDevs.some(d => d.deviceId === micDeviceId)) {
      micSelect.value = micDeviceId;
    } else if (audioDevs.length) {
      micDeviceId = audioDevs[0].deviceId;
    }
  } catch (err) {
    console.warn('[Capture] Could not list mics:', err);
  }
}
populateMics();

/* ── Receive screenshot from main ── */
window.lensCapture.onScreenshot((dataUrl) => {
  const bg = document.getElementById('bg');
  bg.src = dataUrl;
  bg.onload = () => drawInitialDim();
});

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  if (!isDragging) drawInitialDim();
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function drawInitialDim() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

/* ── Drag for screenshot ── */
canvas.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  isDragging = true;
  startX = e.clientX; startY = e.clientY;
  currentX = e.clientX; currentY = e.clientY;
  tip.style.opacity = '0';
});

canvas.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  currentX = e.clientX; currentY = e.clientY;
  drawSelection();
});

/* ── Screenshot shutter sound — Web Audio API (more reliable in Electron) ── */
let _audioCtx = null;
let _shutterBuffer = null;

function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return _audioCtx;
}

// Pre-load the sound buffer as soon as the page is ready
fetch('../assets/fancycamneww.wav')
  .then(r => r.arrayBuffer())
  .then(buf => getAudioCtx().decodeAudioData(buf))
  .then(decoded => { _shutterBuffer = decoded; })
  .catch(err => console.warn('[Lens] Could not load shutter sound:', err));

function playShutter() {
  try {
    const ctx = getAudioCtx();
    // Resume in case AudioContext was suspended (requires user gesture in some builds)
    if (ctx.state === 'suspended') ctx.resume();
    if (!_shutterBuffer) return;
    const src = ctx.createBufferSource();
    src.buffer = _shutterBuffer;
    const gain = ctx.createGain();
    gain.gain.value = 0.55;
    src.connect(gain);
    gain.connect(ctx.destination);
    src.start(0);
  } catch (err) {
    console.warn('[Lens] Shutter sound playback failed:', err);
  }
}

// Resume AudioContext on first user interaction (Electron/browser policy)
document.addEventListener('mousedown', () => {
  if (_audioCtx && _audioCtx.state === 'suspended') _audioCtx.resume();
}, { once: true });

canvas.addEventListener('mouseup', (e) => {
  if (!isDragging) return;
  isDragging = false;
  sizeLabel.style.display = 'none';
  const x = Math.min(startX, currentX);
  const y = Math.min(startY, currentY);
  const w = Math.abs(currentX - startX);
  const h = Math.abs(currentY - startY);
  if (w < 10 || h < 10) { tip.style.opacity = '1'; drawInitialDim(); return; }
  playShutter();
  window.lensCapture.selectRegion({ x, y, width: w, height: h });
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') window.lensCapture.cancel();
});

/* ── Screenshot: hint (just close the tip) ── */
document.getElementById('btn-ss-hint').addEventListener('click', () => {
  tip.style.opacity = '0';
});

/* ── Screenshot: full screen ── */
document.getElementById('btn-ss-full').addEventListener('click', () => {
  playShutter();
  window.lensCapture.fullScreenShot();
});

/* ── Record: region ── */
document.getElementById('btn-rec-region').addEventListener('click', () => {
  window.lensCapture.openScreenRecorder(getSettings());
});

/* ── Record: full screen ── */
document.getElementById('btn-rec-full').addEventListener('click', () => {
  window.lensCapture.openScreenRecorderFullScreen(getSettings());
});

/* ── Gallery ── */
document.getElementById('btn-gallery').addEventListener('click', () => {
  window.lensCapture.cancel(); // close overlay first
  window.lensCapture.openGallery();
});

/* ── Selection drawing ── */
function drawSelection() {
  const x = Math.min(startX, currentX);
  const y = Math.min(startY, currentY);
  const w = Math.abs(currentX - startX);
  const h = Math.abs(currentY - startY);

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.rect(0, 0, canvas.width, canvas.height);
  ctx.rect(x, y, w, h);
  ctx.fill('evenodd');

  ctx.strokeStyle = '#a5b4fc'; ctx.lineWidth = 2;
  ctx.setLineDash([6, 3]); ctx.strokeRect(x, y, w, h); ctx.setLineDash([]);

  ctx.shadowColor = 'rgba(165,180,252,0.4)'; ctx.shadowBlur = 8;
  ctx.strokeStyle = 'rgba(165,180,252,0.3)'; ctx.lineWidth = 1;
  ctx.strokeRect(x + 1, y + 1, w - 2, h - 2);
  ctx.shadowBlur = 0;

  const hs = 8;
  ctx.fillStyle = '#a5b4fc';
  ctx.shadowColor = 'rgba(165,180,252,0.6)'; ctx.shadowBlur = 6;
  [[x, y], [x + w, y], [x, y + h], [x + w, y + h]].forEach(([cx, cy]) => {
    ctx.beginPath(); ctx.arc(cx, cy, hs / 2, 0, Math.PI * 2); ctx.fill();
  });
  ctx.shadowBlur = 0;

  sizeLabel.textContent = `${w} × ${h}`;
  sizeLabel.style.display = 'block';
  sizeLabel.style.left = (x + w / 2 - 30) + 'px';
  sizeLabel.style.top  = (y + h + 14) + 'px';
}
</script>
</body>
</html>
