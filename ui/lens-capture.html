<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MicTab Lens — Select Region</title>
<style>
  :root {
    --lc-panel: rgba(28, 28, 32, 0.65);
    --lc-border: rgba(255, 255, 255, 0.1);
    --lc-text: #f0f0f5;
    --lc-accent: #818cf8;
    --lc-accent-bg: rgba(129, 140, 248, 0.15);
    --lc-muted: rgba(255, 255, 255, 0.5);
    --lc-gallery-bg: rgba(255, 255, 255, 0.05);
    --lc-gallery-border: rgba(255, 255, 255, 0.06);
  }
  [data-theme="light"] {
    --lc-panel: rgba(245, 245, 250, 0.75);
    --lc-border: rgba(0, 0, 0, 0.08);
    --lc-text: #1a1a2e;
    --lc-accent: #4f46e5;
    --lc-accent-bg: rgba(79, 70, 229, 0.08);
    --lc-muted: rgba(0, 0, 0, 0.5);
    --lc-gallery-bg: rgba(0, 0, 0, 0.03);
    --lc-gallery-border: rgba(0, 0, 0, 0.05);
  }
  [data-theme="arctic"] {
    --lc-panel: rgba(240, 245, 255, 0.75);
    --lc-border: rgba(99, 102, 241, 0.12);
    --lc-text: #0f172a;
    --lc-accent: #6366f1;
    --lc-accent-bg: rgba(99, 102, 241, 0.1);
    --lc-muted: rgba(15, 23, 42, 0.5);
    --lc-gallery-bg: rgba(0, 0, 0, 0.03);
    --lc-gallery-border: rgba(99, 102, 241, 0.08);
  }
  [data-theme="bumble"] {
    --lc-panel: rgba(20, 16, 4, 0.72);
    --lc-border: rgba(245, 158, 11, 0.15);
    --lc-accent: #F59E0B;
    --lc-accent-bg: rgba(245, 158, 11, 0.12);
  }
  [data-theme="ocean"] {
    --lc-panel: rgba(4, 14, 28, 0.72);
    --lc-border: rgba(6, 182, 212, 0.15);
    --lc-accent: #06B6D4;
    --lc-accent-bg: rgba(6, 182, 212, 0.12);
  }
  [data-theme="sage"] {
    --lc-panel: rgba(4, 16, 10, 0.72);
    --lc-border: rgba(16, 185, 129, 0.15);
    --lc-accent: #10B981;
    --lc-accent-bg: rgba(16, 185, 129, 0.12);
  }
  [data-theme="rose"] {
    --lc-panel: rgba(20, 4, 10, 0.72);
    --lc-border: rgba(244, 63, 94, 0.15);
    --lc-accent: #F43F5E;
    --lc-accent-bg: rgba(244, 63, 94, 0.12);
  }
  [data-theme="ember"] {
    --lc-panel: rgba(18, 8, 2, 0.72);
    --lc-border: rgba(249, 115, 22, 0.15);
    --lc-accent: #F97316;
    --lc-accent-bg: rgba(249, 115, 22, 0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; cursor: crosshair; user-select: none; -webkit-user-select: none; -webkit-app-region: no-drag; background: transparent; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  #bg { position: fixed; inset: 0; object-fit: cover; width: 100%; height: 100%; }
  #canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 10; }

  /* ── Action Hub ── */
  #tip {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 20; pointer-events: none;
    background: var(--lc-panel);
    backdrop-filter: blur(60px) saturate(200%);
    -webkit-backdrop-filter: blur(60px) saturate(200%);
    border: 1px solid var(--lc-border);
    border-radius: 14px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.35), inset 0 0.5px 0.5px rgba(255,255,255,0.12);
    display: flex;
    flex-direction: column;
    padding: 8px 10px;
    gap: 6px;
    transition: opacity 0.2s ease;
  }
  [data-theme="light"] #tip, [data-theme="arctic"] #tip {
    box-shadow: 0 12px 32px rgba(0,0,0,0.12), inset 0 0.5px 0.5px rgba(255,255,255,0.7);
  }

  .bar-main {
    display: flex;
    flex-direction: column;
    gap: 6px;
    pointer-events: auto;
  }

  .bar-top {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  .bar-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    width: 64px;
    height: 56px;
    border-radius: 8px;
    background: transparent;
    border: 1px solid transparent;
    color: var(--lc-text);
    font: 400 10px/1.15 inherit;
    letter-spacing: 0.01em;
    text-align: center;
    cursor: pointer;
    transition: all 0.18s cubic-bezier(0.16, 1, 0.3, 1);
    flex-shrink: 0;
  }
  .bar-btn svg {
    opacity: 0.85;
    width: 18px; height: 18px;
    flex-shrink: 0;
  }

  .bar-btn:hover {
    background: rgba(255,255,255,0.06);
  }
  [data-theme="light"] .bar-btn:hover, [data-theme="arctic"] .bar-btn:hover {
    background: rgba(0,0,0,0.04);
  }

  .bar-btn:active, .bar-btn.active {
    background: var(--lc-accent-bg);
    border: 1px solid var(--lc-accent);
    color: var(--lc-accent);
  }
  .bar-btn:active svg, .bar-btn.active svg { opacity: 1; }

  .btn-gallery {
    background: var(--lc-gallery-bg);
    border: 1px solid var(--lc-gallery-border);
    box-shadow: inset 0 0.5px 0 rgba(255,255,255,0.04);
  }
  [data-theme="light"] .btn-gallery, [data-theme="arctic"] .btn-gallery {
    box-shadow: inset 0 0.5px 0 rgba(255,255,255,0.4);
  }

  .group-divider {
    width: 1px;
    height: 36px;
    background: rgba(255, 255, 255, 0.07);
    border-radius: 0.5px;
    margin: 0 2px;
  }
  [data-theme="light"] .group-divider, [data-theme="arctic"] .group-divider {
    background: rgba(0, 0, 0, 0.07);
  }

  /* Bottom Settings Row */
  .bar-bottom {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 0;
  }

  .split-btn {
    display: flex;
    align-items: stretch;
    background: rgba(255, 255, 255, 0.04);
    border-radius: 4px;
    border: 1px solid rgba(255, 255, 255, 0.04);
    color: var(--lc-muted);
    height: 18px;
    transition: all 0.15s;
  }
  [data-theme="light"] .split-btn, [data-theme="arctic"] .split-btn {
    background: rgba(0, 0, 0, 0.03);
    border-color: rgba(0, 0, 0, 0.04);
  }
  .split-btn:hover { background: rgba(255, 255, 255, 0.07); }
  [data-theme="light"] .split-btn:hover, [data-theme="arctic"] .split-btn:hover { background: rgba(0, 0, 0, 0.05); }
  
  .split-btn.on {
    color: var(--lc-text);
    background: var(--lc-accent-bg);
    border-color: var(--lc-accent);
  }
  .split-left.on svg.icon { color: var(--lc-text); }

  .split-left {
    display: flex;
    align-items: center;
    gap: 3px;
    padding: 0 5px;
    cursor: pointer;
    font-size: 11px;
    font-weight: 500;
    line-height: 1;
    letter-spacing: 0.01em;
    border-radius: 4px 0 0 4px;
    transition: background 0.15s;
  }
  .split-left:hover { background: rgba(255, 255, 255, 0.05); color: var(--lc-text); }
  [data-theme="light"] .split-left:hover, [data-theme="arctic"] .split-left:hover { background: rgba(0, 0, 0, 0.04); color: var(--lc-text); }

  .split-divider {
    width: 1px;
    background: rgba(255, 255, 255, 0.06);
    margin: 3px 0;
  }
  [data-theme="light"] .split-divider, [data-theme="arctic"] .split-divider {
    background: rgba(0, 0, 0, 0.06);
  }

  .split-right {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 2.5px;
    cursor: pointer;
    border-radius: 0 4px 4px 0;
    position: relative;
    transition: background 0.15s;
  }
  .split-right:hover { background: rgba(255, 255, 255, 0.05); color: var(--lc-text); }
  [data-theme="light"] .split-right:hover, [data-theme="arctic"] .split-right:hover { background: rgba(0, 0, 0, 0.04); color: var(--lc-text); }

  .single-btn {
    display: flex;
    align-items: center;
    gap: 3px;
    padding: 0 5px 0 4px;
    background: rgba(255, 255, 255, 0.04);
    border-radius: 4px;
    border: 1px solid rgba(255, 255, 255, 0.04);
    color: var(--lc-muted);
    font-size: 11px;
    font-weight: 500;
    line-height: 1;
    letter-spacing: 0.01em;
    height: 20px;
    cursor: pointer;
    position: relative;
    transition: all 0.15s;
  }
  [data-theme="light"] .single-btn, [data-theme="arctic"] .single-btn {
    background: rgba(0, 0, 0, 0.03);
    border-color: rgba(0, 0, 0, 0.04);
  }
  .single-btn:hover { background: rgba(255, 255, 255, 0.08); color: var(--lc-text); }
  [data-theme="light"] .single-btn:hover, [data-theme="arctic"] .single-btn:hover { background: rgba(0, 0, 0, 0.06); color: var(--lc-text); }
  .single-btn.on {
    color: var(--lc-text);
    background: var(--lc-accent-bg);
    border-color: var(--lc-accent);
  }
  .single-btn.on svg.icon { color: var(--lc-text); }

  .quality-badge {
    background: rgba(255,255,255,0.1);
    color: var(--lc-text);
    font-size: 9.5px;
    font-weight: 600;
    padding: 2px 4px;
    border-radius: 2px;
    letter-spacing: 0.3px;
  }
  [data-theme="light"] .quality-badge, [data-theme="arctic"] .quality-badge {
    background: rgba(0,0,0,0.07);
  }

  svg.icon { width: 13px; height: 13px; flex-shrink: 0; }
  svg.chevron { width: 10px; height: 10px; opacity: 0.5; flex-shrink: 0; }
  
  .setting-select {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
    z-index: 2;
  }

  /* Size indicator while dragging */
  #size-label {
    position: fixed; z-index: 20; pointer-events: none;
    padding: 3px 8px; border-radius: 5px;
    background: rgba(15,15,20,0.85); backdrop-filter: blur(8px);
    color: var(--lc-accent); font: 600 10px/1 'SF Mono', 'Menlo', monospace;
    display: none;
  }
  
  body.dragging .bar-main {
    pointer-events: none !important;
  }
</style>
</head>
<body>
  <img id="bg">
  <canvas id="canvas"></canvas>

  <div id="tip">
    <div class="bar-main">
      <div class="bar-top">
        <button class="bar-btn" id="btn-ss-hint" title="Drag to Select Region">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
            <path d="M6 8V6a2 2 0 0 1 2-2h2M18 8V6a2 2 0 0 0-2-2h-2M6 16v2a2 2 0 0 0 2 2h2M18 16v2a2 2 0 0 1-2 2h-2"/>
            <path d="M15 9l-6 6m0 0v-3m0 3h3"/>
          </svg>
          <span>Screenshot<br>Area</span>
        </button>
        <button class="bar-btn" id="btn-ss-full" title="Capture Full Screen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
            <rect x="2" y="5" width="20" height="12" rx="2"/>
            <path d="M8 21h8M12 17v4"/>
          </svg>
          <span>Full<br>Screen</span>
        </button>
        
        <div class="group-divider"></div>

        <button class="bar-btn bar-btn-rec" id="btn-rec-region" title="Record Region">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
            <rect x="3" y="3" width="18" height="18" rx="4"/>
            <path d="M9 8H8a1 1 0 0 0-1 1v1m8-2h1a1 1 0 0 1 1 1v1M7 14v1a1 1 0 0 0 1 1h1m8-2v1a1 1 0 0 1-1 1h-1"/>
          </svg>
          <span>Record<br>Area</span>
        </button>
        <button class="bar-btn" id="btn-rec-full" title="Record Full Screen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
            <rect x="2" y="5" width="20" height="14" rx="2"/>
            <polygon points="10 10 15 12 10 14 10 10" fill="none" stroke="currentColor"/>
          </svg>
          <span>Record<br>Screen</span>
        </button>
        
        <div class="group-divider"></div>

        <button class="bar-btn btn-gallery" id="btn-gallery" title="Open Media Gallery">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
            <rect x="3" y="4" width="18" height="16" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5" fill="none"/>
            <path d="M21 15l-5-5L5 20"/>
          </svg>
          <span>Media<br>Gallery</span>
        </button>
      </div>
      
      <div class="bar-bottom">
        <!-- Quality -->
        <label class="single-btn" title="Select Video Quality">
          <span class="quality-badge" id="quality-badge">High</span>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
          <select id="rec-quality" class="setting-select">
            <option value="high">High</option>
            <option value="mid">Medium</option>
            <option value="low">Low</option>
          </select>
        </label>

        <!-- Camera -->
        <div class="split-btn">
          <div class="split-left" id="rec-cam-toggle" title="Toggle Camera">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
            <span>Camera</span>
          </div>
          <div class="split-divider"></div>
          <label class="split-right" title="Camera Settings">
            <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
          </label>
        </div>

        <!-- Microphone -->
        <div class="split-btn">
          <div class="split-left" id="rec-mic-toggle" title="Toggle Microphone">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
            <span>Mic</span>
          </div>
          <div class="split-divider"></div>
          <label class="split-right" title="Select Microphone Device">
            <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
            <select id="rec-mic-select" class="setting-select"></select>
          </label>
        </div>

        <!-- System Audio -->
        <div class="single-btn" id="rec-sys-audio" title="Toggle System Audio">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="2" y="3" width="14" height="9" rx="1.5"/>
            <path d="M5 17h6M8 12v5"/>
            <path d="M17 7.5a3.5 3.5 0 0 1 0 5M19.5 5.5a6.5 6.5 0 0 1 0 9"/>
          </svg>
          <span>System</span>
        </div>
      </div>
    </div>
  </div>

  <div id="size-label"></div>

<script>
'use strict';

/* ── Theme synchronisation ── */
function applyTheme(t) { if (t) document.documentElement.setAttribute('data-theme', t); }
window.lensCapture.getConfig().then(c => { if (c && c.theme) applyTheme(c.theme); }).catch(() => {});
window.lensCapture.onConfigUpdate(c => { if (c && c.theme) applyTheme(c.theme); });

const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const tip    = document.getElementById('tip');
const sizeLabel = document.getElementById('size-label');
let isDragging = false;
let startX = 0, startY = 0;
let currentX = 0, currentY = 0;

/* ── Load saved prefs ── */
let cameraOn   = false;
let quality    = 'high';
let micOn      = true;
let micDeviceId = '';
let sysAudioOn = false;
try {
  const saved = JSON.parse(localStorage.getItem('srec-capture-prefs') || '{}');
  if ('quality' in saved)       quality = saved.quality;

  if ('cameraOn' in saved)      cameraOn = saved.cameraOn;
  if ('micOn' in saved)         micOn = saved.micOn;
  if ('micDeviceId' in saved)   micDeviceId = saved.micDeviceId;
  if ('sysAudioOn' in saved)    sysAudioOn = saved.sysAudioOn;
} catch (_) {}

function savePrefs() {
  localStorage.setItem('srec-capture-prefs', JSON.stringify({ quality, cameraOn, micOn, micDeviceId, sysAudioOn }));
}

function getSettings() {
  return { quality, outputFormat: 'webm', cameraOn, micOn, micDeviceId, sysAudioOn };
}

/* ── DOM refs ── */
const qualitySelect = document.getElementById('rec-quality');
const qualityBadge  = document.getElementById('quality-badge');

const camToggle     = document.getElementById('rec-cam-toggle');
const micToggle     = document.getElementById('rec-mic-toggle');
const micSelect     = document.getElementById('rec-mic-select');
const sysAudioBtn   = document.getElementById('rec-sys-audio');

/* ── Init controls ── */
const qualityMap = { high: 'High', mid: 'Medium', low: 'Low' };
qualitySelect.value = quality;
qualityBadge.textContent = qualityMap[quality] || 'High';

function updateCamToggle() {
  camToggle.parentElement.classList.toggle('on', cameraOn);
  camToggle.classList.toggle('on', cameraOn);
}

function updateMicToggle() {
  micToggle.parentElement.classList.toggle('on', micOn);
  micToggle.classList.toggle('on', micOn);
}

function updateSysAudioBtn() {
  sysAudioBtn.classList.toggle('on', sysAudioOn);
}

updateCamToggle();
updateMicToggle();
updateSysAudioBtn();

qualitySelect.addEventListener('change', () => {
  quality = qualitySelect.value;
  qualityBadge.textContent = qualityMap[quality] || quality;
  savePrefs();
});

camToggle.addEventListener('click', () => { cameraOn = !cameraOn; updateCamToggle(); savePrefs(); });
micToggle.addEventListener('click', () => { micOn = !micOn; updateMicToggle(); savePrefs(); });
sysAudioBtn.addEventListener('click', () => { sysAudioOn = !sysAudioOn; updateSysAudioBtn(); savePrefs(); });
micSelect.addEventListener('change', () => { 
  micDeviceId = micSelect.value; 
  if (!micOn) { micOn = true; updateMicToggle(); }
  savePrefs(); 
});

/* ── Populate microphone list ── */
async function populateMics() {
  try {
    // Need permission first to get labels
    await navigator.mediaDevices.getUserMedia({ audio: true }).then(s => s.getTracks().forEach(t => t.stop()));
    const devices = await navigator.mediaDevices.enumerateDevices();
    const audioDevs = devices.filter(d => d.kind === 'audioinput');
    micSelect.innerHTML = '';
    audioDevs.forEach((dev, i) => {
      const opt = document.createElement('option');
      opt.value = dev.deviceId;
      opt.textContent = dev.label || `Microphone ${i + 1}`;
      micSelect.appendChild(opt);
    });
    // Restore saved device
    if (micDeviceId && audioDevs.some(d => d.deviceId === micDeviceId)) {
      micSelect.value = micDeviceId;
    } else if (audioDevs.length) {
      micDeviceId = audioDevs[0].deviceId;
    }
  } catch (err) {
    console.warn('[Capture] Could not list mics:', err);
  }
}
populateMics();

/* ── Receive screenshot from main ── */
window.lensCapture.onScreenshot((dataUrl) => {
  const bg = document.getElementById('bg');
  bg.src = dataUrl;
  bg.onload = () => drawInitialDim();
});

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  if (!isDragging) drawInitialDim();
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function drawInitialDim() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

/* ── Drag for screenshot ── */
canvas.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  isDragging = true;
  document.body.classList.add('dragging');
  startX = e.clientX; startY = e.clientY;
  currentX = e.clientX; currentY = e.clientY;
  tip.style.opacity = '0';
});

document.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  currentX = e.clientX; currentY = e.clientY;
  drawSelection();
});

/* ── Screenshot shutter sound — Web Audio API (more reliable in Electron) ── */
let _audioCtx = null;
let _shutterBuffer = null;

function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return _audioCtx;
}

// Pre-load the sound buffer as soon as the page is ready
fetch('../assets/fancycamneww.wav')
  .then(r => r.arrayBuffer())
  .then(buf => getAudioCtx().decodeAudioData(buf))
  .then(decoded => { _shutterBuffer = decoded; })
  .catch(err => console.warn('[Lens] Could not load shutter sound:', err));

function playShutter() {
  try {
    const ctx = getAudioCtx();
    // Resume in case AudioContext was suspended (requires user gesture in some builds)
    if (ctx.state === 'suspended') ctx.resume();
    if (!_shutterBuffer) return;
    const src = ctx.createBufferSource();
    src.buffer = _shutterBuffer;
    const gain = ctx.createGain();
    gain.gain.value = 0.55;
    src.connect(gain);
    gain.connect(ctx.destination);
    src.start(0);
  } catch (err) {
    console.warn('[Lens] Shutter sound playback failed:', err);
  }
}

// Resume AudioContext on first user interaction (Electron/browser policy)
document.addEventListener('mousedown', () => {
  if (_audioCtx && _audioCtx.state === 'suspended') _audioCtx.resume();
}, { once: true });

document.addEventListener('mouseup', (e) => {
  if (!isDragging) return;
  isDragging = false;
  document.body.classList.remove('dragging');
  sizeLabel.style.display = 'none';
  const x = Math.min(startX, currentX);
  const y = Math.min(startY, currentY);
  const w = Math.abs(currentX - startX);
  const h = Math.abs(currentY - startY);
  if (w < 10 || h < 10) { tip.style.opacity = '1'; drawInitialDim(); return; }
  playShutter();
  window.lensCapture.selectRegion({ x, y, width: w, height: h });
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') window.lensCapture.cancel();
});

/* ── Screenshot: hint (just close the tip) ── */
document.getElementById('btn-ss-hint').addEventListener('click', () => {
  tip.style.opacity = '0';
});

/* ── Screenshot: full screen ── */
document.getElementById('btn-ss-full').addEventListener('click', () => {
  playShutter();
  window.lensCapture.fullScreenShot();
});

/* ── Record: region ── */
document.getElementById('btn-rec-region').addEventListener('click', () => {
  window.lensCapture.openScreenRecorder(getSettings());
});

/* ── Record: full screen ── */
document.getElementById('btn-rec-full').addEventListener('click', () => {
  window.lensCapture.openScreenRecorderFullScreen(getSettings());
});

/* ── Gallery ── */
document.getElementById('btn-gallery').addEventListener('click', () => {
  window.lensCapture.cancel(); // close overlay first
  window.lensCapture.openGallery();
});

/* ── Selection drawing ── */
function drawSelection() {
  const x = Math.min(startX, currentX);
  const y = Math.min(startY, currentY);
  const w = Math.abs(currentX - startX);
  const h = Math.abs(currentY - startY);

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.rect(0, 0, canvas.width, canvas.height);
  ctx.rect(x, y, w, h);
  ctx.fill('evenodd');

  ctx.strokeStyle = '#a5b4fc'; ctx.lineWidth = 2;
  ctx.setLineDash([6, 3]); ctx.strokeRect(x, y, w, h); ctx.setLineDash([]);

  ctx.shadowColor = 'rgba(165,180,252,0.4)'; ctx.shadowBlur = 8;
  ctx.strokeStyle = 'rgba(165,180,252,0.3)'; ctx.lineWidth = 1;
  ctx.strokeRect(x + 1, y + 1, w - 2, h - 2);
  ctx.shadowBlur = 0;

  const hs = 8;
  ctx.fillStyle = '#a5b4fc';
  ctx.shadowColor = 'rgba(165,180,252,0.6)'; ctx.shadowBlur = 6;
  [[x, y], [x + w, y], [x, y + h], [x + w, y + h]].forEach(([cx, cy]) => {
    ctx.beginPath(); ctx.arc(cx, cy, hs / 2, 0, Math.PI * 2); ctx.fill();
  });
  ctx.shadowBlur = 0;

  sizeLabel.textContent = `${w} × ${h}`;
  sizeLabel.style.display = 'block';
  sizeLabel.style.left = (x + w / 2 - 30) + 'px';
  sizeLabel.style.top  = (y + h + 14) + 'px';
}
</script>
