<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Juno Listening</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent:  #7C6FFF;
    --red:     #FF5F57;
    --bg:      rgba(20, 20, 26, 0.92);
    --surface: rgba(255,255,255,0.07);
    --border:  rgba(255,255,255,0.11);
    --text:    #F0F0F5;
    --muted:   rgba(255,255,255,0.40);
    --radius:  18px;
    --font:    -apple-system, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
  }

  [data-theme="light"] {
    --bg:      rgba(244, 244, 248, 0.92);
    --surface: rgba(0,0,0,0.05);
    --border:  rgba(0,0,0,0.11);
    --text:    #111114;
    --muted:   rgba(0,0,0,0.5);
  }

  html, body {
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* Card — NO overflow:hidden so dropdown can escape */
  #card {
    position: absolute; inset: 0;
    background: var(--bg);
    backdrop-filter: blur(48px) saturate(1.9);
    -webkit-backdrop-filter: blur(48px) saturate(1.9);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: 0 28px 72px rgba(0,0,0,0.6), 0 0 0 0.5px rgba(255,255,255,0.06) inset;
    display: flex;
    flex-direction: column;
    font-family: var(--font);
    color: var(--text);
    /* overflow: visible — let dropdown escape */
  }

  /* ── Title bar ── */
  #titlebar {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 13px 7px;
    flex-shrink: 0;
    border-radius: var(--radius) var(--radius) 0 0;
    -webkit-app-region: drag;
  }

  .dot {
    width: 12px; height: 12px; border-radius: 50%;
    cursor: pointer;
    -webkit-app-region: no-drag;
    flex-shrink: 0;
    transition: filter 0.15s, transform 0.1s;
  }
  .dot:hover  { filter: brightness(1.4); transform: scale(1.15); }
  .dot:active { transform: scale(0.9); }
  #dot-close  { background: var(--red); box-shadow: 0 0 7px rgba(255,95,87,0.5); }

  #pulse-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
    animation: pulse 1.4s ease-in-out infinite;
    flex-shrink: 0; margin-left: 2px;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1);    }
    50%      { opacity: 0.45; transform: scale(1.3); }
  }

  #status-label {
    font-size: 12px; font-weight: 600; letter-spacing: 0.3px;
    color: var(--muted);
    flex: 1;
    -webkit-app-region: drag;
  }

  /* ── Language pill ── */
  #lang-wrapper { position: relative; -webkit-app-region: no-drag; flex-shrink: 0; }

  #lang-btn {
    display: flex; align-items: center; gap: 5px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px 3px 7px;
    font-size: 11.5px; font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
    -webkit-app-region: no-drag;
  }
  #lang-btn:hover { background: rgba(255,255,255,0.13); }
  #lang-flag    { font-size: 14px; line-height: 1; }
  #lang-chevron { font-size: 9px; color: var(--muted); margin-left: 1px; }

  /* ── Settings Button ── */
  #settings-btn {
    display: flex; align-items: center; justify-content: center;
    background: transparent;
    border: none;
    border-radius: 50%;
    width: 26px; height: 26px;
    font-size: 14px; color: var(--muted);
    cursor: pointer; transition: background 0.15s, color 0.15s, transform 0.1s;
    -webkit-app-region: no-drag;
    flex-shrink: 0;
  }
  #settings-btn:hover { background: var(--surface); color: var(--text); transform: scale(1.05); }
  #settings-btn:active { transform: scale(0.95); }
  [data-theme="light"] #settings-btn:hover { background: rgba(0,0,0,0.08); }

  /* ── Mini / Compact button ── */
  #mini-btn, #expand-btn {
    display: flex; align-items: center; justify-content: center;
    background: transparent;
    border: none;
    border-radius: 50%;
    width: 26px; height: 26px;
    font-size: 13px; color: var(--muted);
    cursor: pointer; transition: background 0.15s, color 0.15s, transform 0.1s;
    -webkit-app-region: no-drag;
    flex-shrink: 0;
  }
  #mini-btn:hover  { background: var(--surface); color: var(--text); transform: scale(1.05); }
  #mini-btn:active { transform: scale(0.92); }
  #expand-btn      { display: none; font-size: 14px; }
  #expand-btn:hover  { background: var(--surface); color: var(--text); transform: scale(1.05); }
  #expand-btn:active { transform: scale(0.92); }
  [data-theme="light"] #mini-btn:hover,
  [data-theme="light"] #expand-btn:hover { background: rgba(0,0,0,0.08); }

  /* ── PILL / MINI MODE ─────────────────────────────────────────────────
   * When #card has .mini-mode, collapse everything except the pill bar.
   * The window will be resized to 280×38 by main.js simultaneously.
   */
  #card.mini-mode {
    border-radius: 24px;   /* fully rounded pill shape */
    overflow: hidden;
    height: 38px !important;
    max-height: 38px !important;
    align-self: center;
  }
  /* Pill titlebar becomes the entire card */
  #card.mini-mode #titlebar {
    padding: 0 10px;
    height: 38px;
    flex: 1;
    gap: 6px;
  }
  /* Hide everything except the stop dot, mini waveform, and expand btn */
  #card.mini-mode #pulse-dot,
  #card.mini-mode #status-label,
  #card.mini-mode #lang-wrapper,
  #card.mini-mode #settings-btn,
  #card.mini-mode #mini-btn,
  #card.mini-mode #transcript-area,
  #card.mini-mode #waveform-wrap,
  #card.mini-mode .divider,
  #card.mini-mode #punct-panel,
  #card.mini-mode #footer { display: none !important; }
  /* Show expand button, inline mini waveform, and language flag */
  #card.mini-mode #expand-btn       { display: flex !important; }
  #card.mini-mode #mini-wave-wrap   { display: flex !important; }
  #card.mini-mode #mini-lang-flag   { display: flex !important; }

  /* Inline waveform inside pill titlebar */
  #mini-wave-wrap {
    display: none;
    flex: 1;
    align-items: center;
    height: 28px;
    overflow: hidden;
    -webkit-app-region: drag;
  }
  #mini-wave {
    width: 100%; height: 28px; display: block;
  }

  /* Language flag shown only in pill mode */
  #mini-lang-flag {
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    line-height: 1;
    flex-shrink: 0;
    -webkit-app-region: no-drag;
    cursor: pointer;
    border-radius: 6px;
    padding: 2px 4px;
    transition: background 0.15s;
  }
  #mini-lang-flag:hover { background: rgba(255,255,255,0.12); }

  /*
   * DROPDOWN — Fixed position, placed by JS so it escapes
   * the card boundary regardless of overflow settings.
   */
  #lang-dropdown {
    position: fixed;   /* Escape any parent overflow/clip */
    min-width: 210px;
    max-height: 240px;
    overflow-y: auto;
    background: rgba(26, 26, 34, 0.98);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border: 1px solid var(--border);
    border-radius: 13px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.75), 0 0 0 0.5px rgba(255,255,255,0.07) inset;
    z-index: 9999;
    display: none;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.15) transparent;
  }
  #lang-dropdown::-webkit-scrollbar { width: 4px; }
  #lang-dropdown::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
  #lang-dropdown.open { display: block; animation: dropAnim 0.15s ease both; }
  @keyframes dropAnim {
    from { opacity: 0; transform: scale(0.95); }
    to   { opacity: 1; transform: scale(1); }
  }

  .lang-item {
    display: flex; align-items: center; gap: 9px;
    padding: 8px 12px;
    font-size: 12.5px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .lang-item:hover  { background: rgba(124,111,255,0.22); }
  .lang-item.active { background: rgba(124,111,255,0.14); font-weight: 600; }
  .lang-item .li-fav {
    font-size: 15px; flex-shrink: 0; margin-right: 2px;
    cursor: pointer; transition: transform 0.1s, color 0.1s;
  }
  .lang-item .li-fav:hover {
    transform: scale(1.2); color: var(--accent);
  }
  .lang-item .li-flag { font-size: 16px; flex-shrink: 0; }
  .lang-item .li-name { flex: 1; color: var(--text); }
  .lang-item .li-code { font-size: 10px; color: var(--muted); }
  
  [data-theme="light"] #lang-dropdown {
    background: rgba(255, 255, 255, 0.96);
    box-shadow: 0 20px 50px rgba(0,0,0,0.15), 0 0 0 0.5px rgba(0,0,0,0.05) inset;
  }

  /* ── Transcript (one phrase at a time, fixed height) ── */
  #transcript-area {
    flex: 0 0 auto;
    height: 52px;
    padding: 2px 14px 4px;
    overflow: hidden;
  }
  #phrase-text {
    font-size: 14.5px; font-weight: 400; line-height: 1.5;
    color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    opacity: 1;
    transition: opacity 0.3s ease;
  }
  #phrase-text.fading { opacity: 0; }
  #interim-text {
    font-size: 13px; font-style: italic;
    color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    min-height: 20px;
  }

  /* ── Waveform ── */
  #waveform-wrap { flex: 0 0 32px; padding: 0 14px; }
  #waveform { width: 100%; height: 32px; display: block; }

  .divider { flex: 0 0 1px; background: var(--border); margin: 0 14px; }

  /* ── Punctuation — always pinned at bottom ── */
  #punct-panel {
    flex: 0 0 auto;
    padding: 7px 10px 9px;
    display: flex; flex-direction: column; gap: 5px;
    border-radius: 0 0 var(--radius) var(--radius);
  }
  .punct-row {
    display: flex; gap: 4px; justify-content: center;
  }
  .punct-btn {
    flex: 1; max-width: 44px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    font-size: 14px; font-weight: 500; color: var(--text);
    cursor: pointer;
    transition: background 0.1s, transform 0.07s, border-color 0.1s;
    -webkit-app-region: no-drag;
    user-select: none;
    -webkit-user-select: none;
  }
  .punct-btn:hover  { background: rgba(124,111,255,0.3); border-color: var(--accent); }
  .punct-btn:active { transform: scale(0.88); }
  .punct-btn.flash  { background: rgba(124,111,255,0.5); border-color: var(--accent); }

  /* Enter button — slightly wider, purple accent */
  .punct-btn.enter-btn {
    flex: 1.8;
    max-width: 72px;
    font-size: 16px;
    background: rgba(124,111,255,0.12);
    border-color: rgba(124,111,255,0.3);
  }
  .punct-btn.enter-btn:hover { background: rgba(124,111,255,0.35); }

  /* Backspace button — red tone so it's clearly destructive */
  .punct-btn.back-btn {
    flex: 1.8;
    max-width: 72px;
    font-size: 16px;
    background: rgba(255,95,87,0.08);
    border-color: rgba(255,95,87,0.25);
    color: #FF8A85;
  }
  .punct-btn.back-btn:hover { background: rgba(255,95,87,0.22); border-color: #FF5F57; color: #FF5F57; }
  
  [data-theme="light"] .punct-btn.back-btn {
    background: rgba(229, 57, 53, 0.08);
    border-color: rgba(229, 57, 53, 0.3);
    color: #d32f2f;
  }
  [data-theme="light"] .punct-btn.back-btn:hover {
    background: rgba(229, 57, 53, 0.15);
    border-color: #c62828;
    color: #b71c1c;
  }

  /* ── Shortcut row (⌘A / ⌘C / ⌘X / ⌘V / ⌘Z) ── */
  .kbd-btn {
    flex: 1;
    height: 30px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 1px;
    background: rgba(0, 210, 200, 0.07);
    border: 1px solid rgba(0, 210, 200, 0.22);
    border-radius: 7px;
    font-size: 10px; font-weight: 600;
    color: rgba(0, 220, 210, 0.85);
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s, transform 0.07s;
    -webkit-app-region: no-drag;
    user-select: none; -webkit-user-select: none;
    letter-spacing: 0.2px;
    line-height: 1.1;
    white-space: nowrap;
  }
  .kbd-btn .kbd-key  { font-size: 13px; line-height: 1; }
  .kbd-btn .kbd-label { font-size: 8.5px; color: rgba(0,220,210,0.55); letter-spacing: 0.3px; }
  .kbd-btn:hover  { background: rgba(0,210,200,0.2); border-color: rgba(0,220,210,0.6); color: #00dcd6; }
  .kbd-btn:hover .kbd-label { color: rgba(0,220,210,0.8); }
  .kbd-btn:active { transform: scale(0.88); }
  .kbd-btn.flash  { background: rgba(0,210,200,0.32); border-color: #00dcd6; }
  
  [data-theme="light"] .kbd-btn {
    background: rgba(0, 160, 150, 0.08);
    border-color: rgba(0, 160, 150, 0.3);
    color: rgba(0, 140, 130, 0.95);
  }
  [data-theme="light"] .kbd-btn .kbd-label { color: rgba(0, 140, 130, 0.85); }
  [data-theme="light"] .kbd-btn:hover {
    background: rgba(0, 160, 150, 0.15);
    border-color: rgba(0, 140, 130, 0.5);
    color: rgba(0, 120, 110, 1);
  }
  [data-theme="light"] .kbd-btn:hover .kbd-label { color: rgba(0, 120, 110, 0.95); }
  [data-theme="light"] .kbd-btn.flash { background: rgba(0, 160, 150, 0.25); border-color: rgba(0, 120, 110, 0.8); }

  /* Separator label row */
  .shortcut-sep {
    display: flex; align-items: center; gap: 6px;
    padding: 0 2px;
    font-size: 9px; font-weight: 600; letter-spacing: 0.6px;
    color: rgba(255,255,255,0.18);
    text-transform: uppercase;
  }
  .shortcut-sep::before, .shortcut-sep::after {
    content: ''; flex: 1; height: 1px;
    background: rgba(255,255,255,0.08);
  }
  [data-theme="light"] .shortcut-sep { color: rgba(0,0,0,0.35); }
  [data-theme="light"] .shortcut-sep::before,
  [data-theme="light"] .shortcut-sep::after { background: rgba(0,0,0,0.12); }

  /* ── Footer ── */
  #footer {
    display: flex; align-items: center; justify-content: center;
    gap: 12px;
    margin: 12px -16px -16px -16px;
    padding: 8px 16px;
    background: rgba(255,255,255,0.03);
    border-top: 1px solid var(--border);
    border-bottom-left-radius: 20px;
    border-bottom-right-radius: 20px;
    font-size: 10.5px;
    color: var(--muted);
    -webkit-app-region: no-drag;
  }
  #footer a {
    color: var(--text);
    opacity: 0.8;
    text-decoration: none;
    font-weight: 500;
    transition: opacity 0.15s;
    cursor: pointer;
  }
  #footer a:hover { opacity: 1; }
  .footer-sep { color: var(--muted); opacity: 0.5; }
  [data-theme="light"] #footer { background: rgba(0,0,0,0.02); }
</style>
</head>
<body>
<div id="card">
  <div id="titlebar">
    <div class="dot" id="dot-close" title="Stop"></div>
    <div id="pulse-dot"></div>
    <span id="status-label">Listening…</span>
    <!-- Mini waveform: only visible in pill mode -->
    <div id="mini-wave-wrap"><canvas id="mini-wave"></canvas></div>
    <!-- Language flag: only visible in pill mode, clicking opens lang switcher -->
    <span id="mini-lang-flag" title="Change language">🇺🇸</span>
    <button id="mini-btn" title="Compact mode">&#x292F;</button>
    <button id="settings-btn" title="Open Settings">⚙️</button>
    <div id="lang-wrapper">
      <button id="lang-btn">
        <span id="lang-flag">🇺🇸</span>
        <span id="lang-name">English (US)</span>
        <span id="lang-chevron">▾</span>
      </button>
    </div>
    <!-- Expand button: only visible in pill mode -->
    <button id="expand-btn" title="Expand">⤮</button>
  </div>

  <div id="transcript-area">
    <div id="phrase-text"></div>
    <div id="interim-text"></div>
  </div>

  <div id="waveform-wrap">
    <canvas id="waveform"></canvas>
  </div>

  <div class="divider"></div>

  <div id="punct-panel">
    <div class="punct-row" id="prow1"></div>
    <div class="punct-row" id="prow2"></div>
    <div class="shortcut-sep">Shortcuts</div>
    <div class="punct-row" id="prow3"></div>
  </div>

  <div id="footer">
    <span>By Sayed Johon</span>
    <span class="footer-sep">•</span>
    <a onclick="window.junoAPI.openUrl('https://www.youtube.com/@junoverseai')">YouTube</a>
    <span class="footer-sep">•</span>
    <a onclick="window.junoAPI.openUrl('https://www.peeai.com')">PeeAI.com</a>
    <span class="footer-sep" id="wc-sep" style="display:none">•</span>
    <span id="wc-badge" style="display:none; font-variant-numeric: tabular-nums;">&#x1F4DD; 0 words</span>
  </div>
</div>

<!-- Dropdown is OUTSIDE the card so it's never clipped -->
<div id="lang-dropdown"></div>

<script>
'use strict';

const LANGUAGES = [
  { code:'en-US', name:'English (US)',   flag:'🇺🇸', native:'English', punct:['.','?','!',',','"',';',':','…','(',')','-',"'"] },
  { code:'en-GB', name:'English (UK)',   flag:'🇬🇧', native:'English', punct:['.','?','!',',','"',';',':','…','(',')','-',"'"] },
  { code:'en-CA', name:'English (CA)',   flag:'🇨🇦', native:'English', punct:['.','?','!',',','"',';',':','…','(',')','-',"'"] },
  { code:'en-AU', name:'English (AU)',   flag:'🇦🇺', native:'English', punct:['.','?','!',',','"',';',':','…','(',')','-',"'"] },
  { code:'es-ES', name:'Español (ES)',   flag:'🇪🇸', native:'Español', punct:['.','?','!','¿','¡',',','"',';',':','—','(',')'  ] },
  { code:'es-MX', name:'Español (MX)',   flag:'🇲🇽', native:'Español', punct:['.','?','!','¿','¡',',','"',';',':','—','(',')'  ] },
  { code:'fr-FR', name:'Français (FR)',  flag:'🇫🇷', native:'Français', punct:['.','?','!',',','«','»',';',':','—','…','(',')'  ] },
  { code:'de-DE', name:'Deutsch (DE)',   flag:'🇩🇪', native:'Deutsch', punct:['.','?','!',',','„','"',';',':','—','…','(',')'  ] },
  { code:'it-IT', name:'Italiano (IT)',  flag:'🇮🇹', native:'Italiano', punct:['.','?','!',',','"',';',':','—','…','(',')','-'  ] },
  { code:'pt-BR', name:'Português (BR)', flag:'🇧🇷', native:'Português', punct:['.','?','!',',','"',';',':','—','…','(',')','-'  ] },
  { code:'pt-PT', name:'Português (PT)', flag:'🇵🇹', native:'Português', punct:['.','?','!',',','"',';',':','—','…','(',')','-'  ] },
  { code:'ja-JP', name:'Japanese (JP)',  flag:'🇯🇵', native:'日本語', punct:['。','？','！','、','「','」','…','ー','～','・','（','）'] },
  { code:'zh-CN', name:'Chinese (CN)',   flag:'🇨🇳', native:'中文', punct:['。','？','！','，','；','：','——','……','「','」','（','）'] },
  { code:'ko-KR', name:'Korean (KR)',    flag:'🇰🇷', native:'한국어', punct:['.','?','!',',','「','」',';',':','—','…','(',')'  ] },
  { code:'ar-SA', name:'Arabic (SA)',    flag:'🇸🇦', native:'العربية', punct:['.','؟','!','،','"','"',';',':','—','…','(',')'  ] },
  { code:'bn-BD', name:'Bengali (BD)',   flag:'🇧🇩', native:'বাংলা', punct:['।','?','!',',','"','"',';',':','—','…','(',')'  ] },
  { code:'hi-IN', name:'Hindi (IN)',     flag:'🇮🇳', native:'हिन्दी', punct:['।','?','!',',','"','"',';',':','—','…','(',')'  ] },
  { code:'ru-RU', name:'Русский (RU)',   flag:'🇷🇺', native:'Русский', punct:['.','?','!',',','«','»',';',':','—','…','(',')'  ] },
  { code:'tr-TR', name:'Türkçe (TR)',    flag:'🇹🇷', native:'Türkçe', punct:['.','?','!',',','"','"',';',':','—','…','(',')'  ] },
  { code:'nl-NL', name:'Nederlands (NL)',flag:'🇳🇱', native:'Nederlands', punct:['.','?','!',',','"','"',';',':','—','…','(',')'  ] },
  { code:'pl-PL', name:'Polski (PL)',    flag:'🇵🇱', native:'Polski', punct:['.','?','!',',','"','„',';',':','—','…','(',')'  ] },
];

const isWin = navigator.userAgent.includes('Windows');

let currentLangCode = 'en-US';
let currentLang     = LANGUAGES[0];
let dropdownOpen    = false;
let isSpeaking      = false;
let clearTimer      = null;
let favorites       = [];

const phraseEl      = document.getElementById('phrase-text');
const interimEl     = document.getElementById('interim-text');
const langBtn       = document.getElementById('lang-btn');
const langFlagEl    = document.getElementById('lang-flag');
const langNameEl    = document.getElementById('lang-name');
const dropdown      = document.getElementById('lang-dropdown');
const miniFlagEl    = document.getElementById('mini-lang-flag');
const prow1         = document.getElementById('prow1');
const prow2         = document.getElementById('prow2');
const prow3         = document.getElementById('prow3');
const canvas        = document.getElementById('waveform');
const ctx           = canvas.getContext('2d');

// ── Init ──────────────────────────────────────────────────────
window.junoAPI.getConfig().then(cfg => {
  if (cfg.favorites) favorites = cfg.favorites;
  setLanguage(cfg.language || 'en-US', false);
  // Restore mini mode state
  if (cfg.overlayMini) applyMiniMode(true, false);
});

// ── Language ──────────────────────────────────────────────────
function setLanguage(code, notify=true) {
  currentLangCode = code;
  currentLang = LANGUAGES.find(l => l.code === code) || LANGUAGES[0];
  
  const flagHtml = isWin && currentLang.code.includes('-') 
    ? `<img src="https://flagcdn.com/16x12/${currentLang.code.split('-')[1].toLowerCase()}.png" width="16" style="vertical-align:-1px;">`
    : currentLang.flag;
    
  langFlagEl.innerHTML = flagHtml;
  langNameEl.textContent = currentLang.name;
  // Keep the pill-mode flag in sync
  if (miniFlagEl) miniFlagEl.innerHTML = flagHtml;
  buildPunctuation(currentLang.punct);
  buildDropdown();
  if (notify) window.junoAPI.changeLanguage(code);
}

// Clicking the pill flag opens the same language dropdown as the full-mode button
if (miniFlagEl) {
  miniFlagEl.addEventListener('click', (e) => {
    e.stopPropagation();
    langBtn.click(); // re-use existing toggle logic
  });
}

// Detect OS for shortcut label (⌘ on Mac, Ctrl on Windows/Linux)
const IS_MAC = navigator.platform.toUpperCase().includes('MAC');
const MOD    = IS_MAC ? '⌘' : 'Ctrl';

const SHORTCUTS = [
  { key: 'A', label: 'Select All', fn: () => window.junoAPI.injectSelectAll() },
  { key: 'C', label: 'Copy',       fn: () => window.junoAPI.injectCopy()      },
  { key: 'X', label: 'Cut',        fn: () => window.junoAPI.injectCut()       },
  { key: 'V', label: 'Paste',      fn: () => window.junoAPI.injectPaste()     },
  { key: 'Z', label: 'Undo',       fn: () => window.junoAPI.injectUndo()      },
];

function buildPunctuation(chars) {
  const mid = Math.ceil(chars.length / 2);
  prow1.innerHTML = '';
  prow2.innerHTML = '';
  prow3.innerHTML = '';

  // Row 1: first half of punct chars  +  ⌫ Backspace (destructive, red)
  chars.slice(0, mid).forEach(c => prow1.appendChild(mkBtn(c)));
  prow1.appendChild(mkBackspaceBtn());

  // Row 2: second half of punct chars  +  ↵ Enter/Return (action, purple)
  chars.slice(mid).forEach(c => prow2.appendChild(mkBtn(c)));
  prow2.appendChild(mkEnterBtn());

  // Row 3: keyboard shortcut buttons (same for every language)
  SHORTCUTS.forEach(s => prow3.appendChild(mkKbdBtn(s)));
}

function mkBtn(char) {
  const b = document.createElement('button');
  b.className = 'punct-btn';
  
  const isSpace = char === '…' || char === '……';
  b.textContent = isSpace ? '␣' : char;
  if (isSpace) b.title = 'Insert a space';

  b.addEventListener('mousedown', e => {
    e.preventDefault(); e.stopPropagation();
    window.junoAPI.injectPunct(isSpace ? ' ' : char + ' ');
    flash(b);
  });
  return b;
}

function mkEnterBtn() {
  const b = document.createElement('button');
  b.className = 'punct-btn enter-btn';
  b.textContent = '↵';
  b.title = 'Return / Enter — move to new line';
  b.addEventListener('mousedown', e => {
    e.preventDefault(); e.stopPropagation();
  });
  b.addEventListener('mouseup', e => {
    e.preventDefault(); e.stopPropagation();
    window.junoAPI.injectEnter();
    flash(b);
  });
  return b;
}

function mkBackspaceBtn() {
  const b = document.createElement('button');
  b.className = 'punct-btn back-btn';
  b.textContent = '⌫';
  b.title = 'Backspace — hold to erase continuously';

  let initialTimer = null;
  let repeatTimer  = null;

  function startRepeat() {
    // Fire once immediately
    window.junoAPI.injectBackspace();
    flash(b);

    // After OS-like initial delay (500ms), start rapid repeat
    initialTimer = setTimeout(() => {
      repeatTimer = setInterval(() => {
        window.junoAPI.injectBackspace();
      }, 40); // ~25 chars/sec — matches macOS/Windows repeat rate
    }, 500);
  }

  function stopRepeat() {
    clearTimeout(initialTimer);
    clearInterval(repeatTimer);
    initialTimer = null;
    repeatTimer  = null;
  }

  b.addEventListener('mousedown', e => {
    e.preventDefault(); e.stopPropagation();
    startRepeat();
  });

  // Stop on release OR if cursor leaves the button
  b.addEventListener('mouseup',    stopRepeat);
  b.addEventListener('mouseleave', stopRepeat);

  return b;
}

function mkKbdBtn({ key, label, fn }) {
  const b = document.createElement('button');
  b.className = 'kbd-btn';
  b.title = `${MOD}+${key} — ${label}`;
  b.innerHTML = `<span class="kbd-key">${MOD}${key}</span><span class="kbd-label">${label}</span>`;
  b.addEventListener('mousedown', e => {
    e.preventDefault(); e.stopPropagation();
  });
  b.addEventListener('mouseup', e => {
    e.preventDefault(); e.stopPropagation();
    fn();
    flash(b);
  });
  return b;
}

function flash(btn) {
  btn.classList.add('flash');
  setTimeout(() => btn.classList.remove('flash'), 180);
}

// ── Dropdown — position: fixed, placed by JS ──────────────────
function buildDropdown() {
  dropdown.innerHTML = '';
  
  // Sort: favorites first, then the rest
  const sorted = [...LANGUAGES].sort((a, b) => {
    const aFav = favorites.includes(a.code);
    const bFav = favorites.includes(b.code);
    if (aFav && !bFav) return -1;
    if (!aFav && bFav) return 1;
    return 0;
  });

  sorted.forEach(lang => {
    const d = document.createElement('div');
    d.className = 'lang-item' + (lang.code === currentLangCode ? ' active' : '');
    const isFav = favorites.includes(lang.code);
    
    const flagHtml = isWin && lang.code.includes('-') 
      ? `<img src="https://flagcdn.com/16x12/${lang.code.split('-')[1].toLowerCase()}.png" width="16" style="vertical-align:-1px;">`
      : lang.flag;

    d.innerHTML = `
      <span class="li-fav" style="${isFav ? 'color: var(--accent);' : 'color: var(--muted);'}" title="Toggle Favorite">
        ${isFav ? '★' : '☆'}
      </span>
      <span class="li-flag">${flagHtml}</span>
      <span class="li-name">${lang.name}</span>
      <span class="li-code">${lang.native}</span>`;
    
    d.addEventListener('mousedown', e => {
      // Toggle favorite
      if (e.target.classList.contains('li-fav')) {
        e.preventDefault(); e.stopPropagation();
        if (isFav) {
          favorites = favorites.filter(f => f !== lang.code);
        } else {
          favorites.push(lang.code);
        }
        window.junoAPI.toggleFavorite(lang.code);
        buildDropdown(); // Refresh UI to sort
        return;
      }

      e.preventDefault();
      setLanguage(lang.code);
      closeDD();
    });
    dropdown.appendChild(d);
  });
}

function positionDropdown() {
  const rect = langBtn.getBoundingClientRect();
  const ddH  = Math.min(240, LANGUAGES.length * 37);  // estimated height
  
  // Try to open above first, otherwise below
  const spaceAbove = rect.top;
  const spaceBelow = window.innerHeight - rect.bottom;

  if (spaceAbove > ddH || spaceAbove > spaceBelow) {
    // Open above
    dropdown.style.top    = (rect.top - ddH - 6) + 'px';
  } else {
    // Open below
    dropdown.style.top    = (rect.bottom + 6) + 'px';
  }
  dropdown.style.right  = (window.innerWidth - rect.right) + 'px';
  dropdown.style.left   = 'auto';
}

function openDD() {
  dropdownOpen = true;
  buildDropdown();        // rebuild to refresh active state
  positionDropdown();
  dropdown.classList.add('open');
}
function closeDD() {
  dropdownOpen = false;
  dropdown.classList.remove('open');
}

langBtn.addEventListener('mousedown', e => {
  e.preventDefault();
  dropdownOpen ? closeDD() : openDD();
});

document.addEventListener('mousedown', e => {
  if (dropdownOpen && !dropdown.contains(e.target) && e.target !== langBtn && !langBtn.contains(e.target)) {
    closeDD();
  }
});

// ── Stop button ───────────────────────────────────────────────
document.getElementById('dot-close').addEventListener('mousedown', e => {
  e.preventDefault();
  window.junoAPI.stopListening();
});

// ── Settings button ───────────────────────────────────────────
document.getElementById('settings-btn').addEventListener('mousedown', e => {
  e.preventDefault(); e.stopPropagation();
  window.junoAPI.openSettings();
});

// ── Mini / Pill mode ──────────────────────────────────────────
let isMiniMode = false;

function applyMiniMode(mini, notify = true) {
  isMiniMode = mini;
  const card = document.getElementById('card');
  if (mini) {
    card.classList.add('mini-mode');
    syncMiniWave(); // start syncing mini waveform
  } else {
    card.classList.remove('mini-mode');
  }
  if (notify) window.junoAPI.setMiniMode(mini);
}

document.getElementById('mini-btn').addEventListener('mousedown', e => {
  e.preventDefault(); e.stopPropagation();
  applyMiniMode(true);
});
document.getElementById('expand-btn').addEventListener('mousedown', e => {
  e.preventDefault(); e.stopPropagation();
  applyMiniMode(false);
});

// ── IPC ───────────────────────────────────────────────────────
function applyOverlayTheme(themeVal) {
  let t = themeVal || 'system';
  if (t === 'system') {
    t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  document.documentElement.setAttribute('data-theme', t);
}

// Listen for OS theme changes while overlay is active
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  window.junoAPI.getConfig().then(cfg => {
    if (cfg.visualizerType) visualizerType = cfg.visualizerType;
    if ((cfg.theme || 'system') === 'system') {
      applyOverlayTheme('system');
    }
  });
});

window.junoAPI.onConfigUpdate && window.junoAPI.onConfigUpdate((cfg) => {
  if (cfg.visualizerType) visualizerType = cfg.visualizerType;
  if (cfg.theme && typeof applyOverlayTheme === 'function') applyOverlayTheme(cfg.theme);
});

window.junoAPI.onSessionStart((data) => {
  window.junoAPI.getConfig().then(cfg => {
    applyOverlayTheme(cfg.theme);
  });

  // Reset live word count badge for this session
  if (typeof wcBadge !== 'undefined') {
    wcBadge.style.display = 'none';
    wcSep.style.display   = 'none';
    wcBadge.textContent   = '📝 0 words';
  }
  
  clearTimer && clearTimeout(clearTimer);
  phraseEl.textContent  = '';
  interimEl.textContent = '';
  phraseEl.classList.remove('fading');
  if (data && data.lang) setLanguage(data.lang, false);
});

window.junoAPI.onTranscript((data) => {
  const text = (data.text || data).trim();
  if (!text) return;

  clearTimer && clearTimeout(clearTimer);
  phraseEl.classList.remove('fading');
  phraseEl.textContent  = text;
  interimEl.textContent = '';
  isSpeaking = false;

  clearTimer = setTimeout(() => {
    phraseEl.classList.add('fading');
    setTimeout(() => {
      phraseEl.textContent = '';
      phraseEl.classList.remove('fading');
    }, 320);
  }, 1800);
});

window.junoAPI.onInterim((text) => {
  interimEl.textContent = text || '';
  isSpeaking = !!text;
});

window.junoAPI.onStatus((s) => {
  document.getElementById('status-label').textContent =
    s === 'silence-timeout' ? 'Stopped (silence)' : 'Listening…';
});

window.junoAPI.onLanguage((code) => setLanguage(code, false));

// ── Tray language switch ───────────────────────────────────────
// Fired when user picks a language from the tray submenu
window.junoAPI.onSetLanguage((code) => setLanguage(code, false));

// ── Live session word count badge ───────────────────────────
const wcBadge = document.getElementById('wc-badge');
const wcSep   = document.getElementById('wc-sep');
window.junoAPI.onSessionWordCount((n) => {
  if (n > 0) {
    wcBadge.textContent   = `📝 ${n.toLocaleString()} word${n === 1 ? '' : 's'}`;
    wcBadge.style.display = 'inline';
    wcSep.style.display   = 'inline';
  }
});

// ── Audio playback ─────────────────────────────────────────────
const clickSound = new Audio('../assets/computer-mouse-click.mp3');
const closeSound = new Audio('../assets/ui-close.aac');
clickSound.volume = 0.8; // Set a reasonable volume
closeSound.volume = 0.8;
window.junoAPI.onPlaySound((isStarting) => {
  // Reset time to allow rapid re-triggers
  if (isStarting) {
    clickSound.currentTime = 0;
    clickSound.play().catch(err => console.log('Audio playback failed:', err));
  } else {
    closeSound.currentTime = 0;
    closeSound.play().catch(err => console.log('Audio playback failed:', err));
  }
});

// ── Visualizer State & Settings ──────────────────────────────────
let visualizerType = 'wave';
let currentAudioData = { bins: new Array(15).fill(0), volume: 0 };
let smoothedBins = new Array(15).fill(0);
let smoothedVol = 0;
let wavePhase = 0, miniPhase = 0;
let currentAmp = 2.5, currentMiniAmp = 2.0;

if (window.junoAPI.onAudioData) {
  window.junoAPI.onAudioData((data) => {
    if (data && data.bins && data.bins.length) currentAudioData = data;
  });
}

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = canvas.offsetWidth  * dpr;
  canvas.height = canvas.offsetHeight * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resizeCanvas();
new ResizeObserver(resizeCanvas).observe(canvas);

function getNeonGradient(c, w) {
  const g = c.createLinearGradient(0, 0, w, 0);
  g.addColorStop(0,    'rgba(124,111,255,0)');
  g.addColorStop(0.15, 'rgba(124,111,255,0.85)');
  g.addColorStop(0.85, 'rgba(124,111,255,0.85)');
  g.addColorStop(1,    'rgba(124,111,255,0)');
  return g;
}

function updateSmoothings() {
  const volTarget = isSpeaking ? (currentAudioData.volume / 255) : 0;
  smoothedVol += (volTarget - smoothedVol) * 0.2;
  for (let i = 0; i < 15; i++) {
    const val = isSpeaking && i < currentAudioData.bins.length ? (currentAudioData.bins[i] / 255) : 0;
    smoothedBins[i] += (val - smoothedBins[i]) * 0.2;
  }
}

// Particle system state
const particles = Array.from({ length: 40 }).map(() => ({
  x: Math.random(),
  y: Math.random(),
  speed: Math.random() * 0.02 + 0.005,
  offset: Math.random() * Math.PI * 2
}));

// Draw functions
function drawTypeWave(c, w, h, isMini) {
  const phaseStep = isSpeaking ? 0.075 : 0.022;
  if (isMini) miniPhase += phaseStep; else wavePhase += phaseStep;
  const phase = isMini ? miniPhase : wavePhase;
  
  const baseAmp = isMini ? 2.0 : 2.5;
  const maxAmp  = isMini ? 12 : 25;
  const targetAmp = isSpeaking ? baseAmp + (currentAudioData.volume / 255) * maxAmp : baseAmp;
  
  if (isMini) {
    currentMiniAmp += (targetAmp - currentMiniAmp) * 0.2;
  } else {
    currentAmp += (targetAmp - currentAmp) * 0.2;
  }
  const amp = isMini ? currentMiniAmp : currentAmp;

  c.beginPath();
  const steps = Math.floor(w / 3);
  for (let i = 0; i <= steps; i++) {
    const x = (i / steps) * w;
    const y = h/2
      + Math.sin(i*0.45 + phase) * amp
      + Math.sin(i*0.9  + phase * 1.3) * amp * 0.5
      + Math.sin(i*0.2  + phase * 0.7) * amp * 0.3;
    i === 0 ? c.moveTo(x, y) : c.lineTo(x, y);
  }

  c.strokeStyle = getNeonGradient(c, w);
  c.lineWidth   = isSpeaking ? (isMini ? 2 : 2.2) : (isMini ? 1.2 : 1.4);
  c.shadowBlur  = isSpeaking ? 10 : 3;
  c.shadowColor = 'rgba(124,111,255,0.55)';
  c.stroke();
}

function drawTypeBars(c, w, h, isMini) {
  const barCount = 15;
  const gap = isMini ? 2 : 4;
  const totalGapWidth = gap * (barCount - 1);
  const playArea = w * 0.8; 
  const startX = (w - playArea) / 2;
  const barWidth = (playArea - totalGapWidth) / barCount;
  const maxH = isMini ? h * 0.8 : h * 0.6;
  const minH = isMini ? 2 : 4;

  c.fillStyle = getNeonGradient(c, w);
  c.shadowBlur = isSpeaking ? 8 : 2;
  c.shadowColor = 'rgba(124,111,255,0.5)';

  for (let i = 0; i < barCount; i++) {
    const height = minH + smoothedBins[i] * maxH;
    const x = startX + i * (barWidth + gap);
    const y = h/2 - height/2;
    c.beginPath();
    if(c.roundRect) c.roundRect(x, y, barWidth, height, barWidth/2);
    else c.rect(x,y,barWidth,height);
    c.fill();
  }
}

function drawTypePulse(c, w, h, isMini) {
  const cx = w / 2;
  const cy = h / 2;
  const maxR = isMini ? h * 0.4 : h * 0.8;
  const minR = isMini ? 3 : 8;
  
  c.shadowBlur = isSpeaking ? 15 : 5;
  c.shadowColor = 'rgba(124,111,255,0.8)';
  c.strokeStyle = 'rgba(124,111,255,0.9)';
  c.lineWidth = isMini ? 2 : 3;
  
  const r1 = minR + smoothedVol * maxR;
  const r2 = minR + smoothedVol * maxR * 1.5;

  c.beginPath(); c.arc(cx, cy, r1, 0, Math.PI*2); c.stroke();
  
  if (smoothedVol > 0.1) {
    c.strokeStyle = `rgba(124,111,255,${0.5 * smoothedVol})`;
    c.beginPath(); c.arc(cx, cy, r2, 0, Math.PI*2); c.stroke();
  }
}

function drawTypeParticles(c, w, h, isMini) {
  c.shadowBlur = isSpeaking ? 6 : 2;
  c.shadowColor = 'rgba(124,111,255,0.6)';
  c.fillStyle = 'rgba(124,111,255,0.9)';
  
  const pSize = isMini ? 2 : 3;
  
  particles.forEach((p, i) => {
    const binIdx = i % 15;
    const binVal = smoothedBins[binIdx];
    
    p.offset += p.speed;
    const px = (p.x * w) + Math.sin(p.offset) * (10 + binVal*20);
    const py = (h/2) + Math.cos(p.offset) * (isMini ? 4 : 15) * (1 + binVal*(isMini?5:10));
    
    c.beginPath();
    c.arc(px, py, pSize + binVal*2, 0, Math.PI*2);
    c.fill();
  });
}

function drawTypeLine(c, w, h, isMini) {
  const count = 15;
  const totalPts = count * 2 - 1; // 14..0..14
  const step = w / (totalPts - 1);
  const maxH = isMini ? h*0.4 : h*0.6;
  const minH = isMini ? 1 : 2;
  
  c.beginPath();
  let x = 0;
  for (let i = count - 1; i >= 0; i--, x += step) {
    const y = h/2 - minH - smoothedBins[i] * maxH;
    i === count - 1 ? c.moveTo(x, y) : c.lineTo(x, y);
  }
  for (let i = 1; i < count; i++, x += step) {
    const y = h/2 - minH - smoothedBins[i] * maxH;
    c.lineTo(x, y);
  }
  
  c.strokeStyle = getNeonGradient(c, w);
  c.lineWidth = isMini ? 2 : 3;
  c.shadowBlur = isSpeaking ? 10 : 3;
  c.shadowColor = 'rgba(124,111,255,0.6)';
  c.stroke();
}

function drawTypeMatrix(c, w, h, isMini) {
  const barCount = 15;
  const gap = isMini ? 2 : 3;
  const blocksPerBar = isMini ? 3 : 5;
  const playArea = w * 0.6; 
  const startX = (w - playArea) / 2;
  const bW = playArea / barCount;
  const bH = (h * 0.6) / blocksPerBar;
  
  for (let i = 0; i < barCount; i++) {
    const fillBlocks = Math.max(isSpeaking ? 1 : 0, Math.round(smoothedBins[i] * blocksPerBar));
    for (let j = 0; j < blocksPerBar; j++) {
      if (j >= fillBlocks && fillBlocks > 0) continue; 
      // when not speaking, draw 1 very faint block
      if (!isSpeaking && j > 0) continue;
      
      const x = startX + i * bW;
      const y = h/2 + (isMini ? 5 : 10) - (j * bH) - bH;
      c.fillStyle = isSpeaking ? `rgba(124,111,255,${0.3 + (j / blocksPerBar)*0.7})` : `rgba(124,111,255,0.1)`;
      c.shadowBlur = isSpeaking ? 4 : 0;
      c.shadowColor = 'rgba(124,111,255,0.5)';
      c.fillRect(x + gap/2, y + gap/2, bW - gap, bH - gap);
    }
  }
}

function drawVisualizer() {
  updateSmoothings();
  
  const W = canvas.offsetWidth;
  const H = canvas.offsetHeight;
  ctx.clearRect(0, 0, W, H);
  
  switch (visualizerType) {
    case 'bars':      drawTypeBars(ctx, W, H, false); break;
    case 'pulse':     drawTypePulse(ctx, W, H, false); break;
    case 'particles': drawTypeParticles(ctx, W, H, false); break;
    case 'line':      drawTypeLine(ctx, W, H, false); break;
    case 'matrix':    drawTypeMatrix(ctx, W, H, false); break;
    case 'wave': 
    default:          drawTypeWave(ctx, W, H, false); break;
  }
  requestAnimationFrame(drawVisualizer);
}
drawVisualizer();

// ── Mini waveform (pill mode) ─────────────────────────────────
const miniCanvas = document.getElementById('mini-wave');
const mctx       = miniCanvas.getContext('2d');

function resizeMiniCanvas() {
  const dpr = window.devicePixelRatio || 1;
  miniCanvas.width  = miniCanvas.offsetWidth  * dpr;
  miniCanvas.height = miniCanvas.offsetHeight * dpr;
  mctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
new ResizeObserver(resizeMiniCanvas).observe(miniCanvas);
resizeMiniCanvas();

function drawMiniWave() {
  if (!isMiniMode) return;
  const W = miniCanvas.offsetWidth;
  const H = miniCanvas.offsetHeight;
  mctx.clearRect(0, 0, W, H);

  switch (visualizerType) {
    case 'bars':      drawTypeBars(mctx, W, H, true); break;
    case 'pulse':     drawTypePulse(mctx, W, H, true); break;
    case 'particles': drawTypeParticles(mctx, W, H, true); break;
    case 'line':      drawTypeLine(mctx, W, H, true); break;
    case 'matrix':    drawTypeMatrix(mctx, W, H, true); break;
    case 'wave': 
    default:          drawTypeWave(mctx, W, H, true); break;
  }
  requestAnimationFrame(drawMiniWave);
}

function syncMiniWave() {
  drawMiniWave();
}
</script>
