<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Games</title>
    <link rel="stylesheet" href="../shared-animations.css">
    <style>
        :root { --ios-pink: #ff2d55; --ios-bg: #fff; --ios-gray: #8e8e93; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; }
        body { background: var(--ios-bg); color: #000; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        
        .top-nav { 
            padding: 10px 16px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            z-index: 100;
        }
        .nav-btn { color: var(--ios-pink); text-decoration: none; font-size: 17px; font-weight: 400; }
        .nav-profile { width: 32px; height: 32px; border-radius: 50%; background: #f2f2f7; display: flex; align-items: center; justify-content: center; font-size: 18px; }

        .header { padding: 10px 16px 12px; }
        .header-title { font-size: 34px; font-weight: 700; }

        /* Featured Game */
        .featured-hero {
            margin: 0 16px 25px;
            height: 220px;
            border-radius: 16px;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            padding: 20px;
            color: #fff;
            box-shadow: 0 10px 30px rgba(255, 45, 85, 0.2);
        }
        .hero-icon { font-size: 60px; position: absolute; top: 20px; right: 20px; opacity: 0.3; }
        .hero-content h2 { font-size: 28px; font-weight: 800; line-height: 1; }
        .hero-content p { font-size: 15px; font-weight: 600; opacity: 0.9; }

        .section-header { padding: 0 16px 15px; display: flex; justify-content: space-between; align-items: baseline; }
        .section-title { font-size: 22px; font-weight: 700; }
        .section-link { color: var(--ios-pink); font-size: 15px; text-decoration: none; }

        .game-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 16px 40px; }
        .game-card { 
            background: #f2f2f7; 
            border-radius: 14px; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 10px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .game-card:active { transform: scale(0.95); }
        .game-icon { font-size: 40px; }
        .game-name { font-size: 15px; font-weight: 700; text-align: center; }
        .play-tag { font-size: 11px; font-weight: 800; color: var(--ios-pink); text-transform: uppercase; }

        /* Tab Bar */
        .tab-bar {
            background: rgba(249, 249, 249, 0.94);
            backdrop-filter: blur(20px);
            border-top: 1px solid #d1d1d1;
            display: flex;
            justify-content: space-around;
            padding: 10px 0 24px;
            position: sticky;
            bottom: 0;
            z-index: 100;
        }
        .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--ios-gray); text-decoration: none; min-width: 60px; }
        .tab-item.active { color: var(--ios-pink); }
        .tab-icon { font-size: 24px; }
        .tab-label { font-size: 10px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="top-nav">
        <a href="../index.html" class="nav-btn">‹ Back</a>
        <div class="nav-profile">👤</div>
    </div>

    <div class="header">
        <div class="header-title">Fun & Games</div>
    </div>

    <div class="featured-hero">
        <div class="hero-icon">🎲</div>
        <div class="hero-content">
            <p>FEATURED CHALLENGE</p>
            <h2>Trivia Master</h2>
        </div>
    </div>

    <div class="section-header">
        <div class="section-title">Quick Games</div>
        <a href="#" class="section-link">See All</a>
    </div>

    <div class="game-grid">
        <div class="game-card">
            <span class="game-icon">🎰</span>
            <span class="game-name">Spin the Wheel</span>
            <span class="play-tag">Play Now</span>
        </div>
        <div class="game-card">
            <span class="game-icon">⚡</span>
            <span class="game-name">Reaction Test</span>
            <span class="play-tag">Play Now</span>
        </div>
        <div class="game-card">
            <span class="game-icon">🪙</span>
            <span class="game-name">Coin Flipper</span>
            <span class="play-tag">Play Now</span>
        </div>
        <div class="game-card">
            <span class="game-icon">🎲</span>
            <span class="game-name">Dice Roller</span>
            <span class="play-tag">Play Now</span>
        </div>
        <div class="game-card">
            <span class="game-icon">⌨️</span>
            <span class="game-name">Typing Test</span>
            <span class="play-tag">Play Now</span>
        </div>
        <div class="game-card">
            <span class="game-icon">🤔</span>
            <span class="game-name">WYR?</span>
            <span class="play-tag">Play Now</span>
        </div>
    </div>

    <div class="tab-bar">
        <a href="#" class="tab-item active">
            <span class="tab-icon">🎮</span>
            <span class="tab-label">Games</span>
        </a>
        <a href="#" class="tab-item">
            <span class="tab-icon">🏆</span>
            <span class="tab-label">Leaderboard</span>
        </a>
        <a href="#" class="tab-item">
            <span class="tab-icon">👤</span>
            <span class="tab-label">Profile</span>
        </a>
    </div>
    <script src="../shared-utils.js"></script>
    <script src="script.js"></script>
</body>
</html>
