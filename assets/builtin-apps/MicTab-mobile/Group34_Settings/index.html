<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Settings</title>
    <style>
        :root {
            --bg-color: #f2f2f7;
            --section-bg: #ffffff;
            --text-color: #000000;
            --text-secondary: #8e8e93;
            --border-color: #c6c6c8;
            --accent-color: #007aff;
            --chevron-color: #c4c4c6;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --section-bg: #1c1c1e;
                --text-color: #ffffff;
                --text-secondary: #8e8e93;
                --border-color: #38383a;
                --chevron-color: #48484a;
            }
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 100%;
            padding-bottom: 40px;
        }

        header {
            padding: 50px 16px 10px;
            position: sticky;
            top: 0;
            background-color: var(--bg-color);
            z-index: 10;
        }

        h1 {
            font-size: 34px;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .search-bar {
            margin: 10px 16px;
            background-color: rgba(142, 142, 147, 0.12);
            border-radius: 10px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-bar svg {
            fill: var(--text-secondary);
        }

        .search-bar input {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 17px;
            width: 100%;
            outline: none;
        }

        .search-bar input::placeholder {
            color: var(--text-secondary);
        }

        .section {
            margin: 20px 16px;
            background-color: var(--section-bg);
            border-radius: 10px;
            overflow: hidden;
        }

        .profile-section {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            gap: 16px;
        }

        .profile-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #a2b0b9, #546e7a);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 24px;
            font-weight: 600;
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-size: 20px;
            font-weight: 500;
        }

        .profile-detail {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .list-item {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            gap: 15px;
            cursor: pointer;
            position: relative;
        }

        .list-item:not(:last-child)::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            left: 47px;
            height: 1px;
            background-color: var(--border-color);
        }

        .list-item:active {
            background-color: rgba(0, 0, 0, 0.05);
        }

        @media (prefers-color-scheme: dark) {
            .list-item:active {
                background-color: rgba(255, 255, 255, 0.1);
            }
        }

        .icon-box {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .icon-box svg {
            fill: white;
            width: 18px;
            height: 18px;
        }

        .item-label {
            flex: 1;
            font-size: 17px;
        }

        .item-value {
            font-size: 17px;
            color: var(--text-secondary);
            margin-right: 4px;
        }

        .chevron {
            color: var(--chevron-color);
            display: flex;
            align-items: center;
        }

        /* Icon Colors */
        .bg-orange { background-color: #ff9500; }
        .bg-blue { background-color: #007aff; }
        .bg-green { background-color: #34c759; }
        .bg-red { background-color: #ff3b30; }
        .bg-purple { background-color: #5856d6; }
        .bg-pink { background-color: #ff2d55; }
        .bg-gray { background-color: #8e8e93; }
        .bg-teal { background-color: #5ac8fa; }
        .bg-indigo { background-color: #5856d6; }

    </style>
</head>
<body>
