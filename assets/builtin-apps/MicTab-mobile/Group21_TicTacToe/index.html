<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="../shared-animations.css">
    <style>
        :root { --ios-blue: #007aff; --ios-bg: #1c1c1e; --ios-gray: #3a3a3c; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; }
        body { background: #000; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        
        .header { position: fixed; top: 40px; text-align: center; width: 100%; }
        .title { font-size: 28px; font-weight: 700; margin-bottom: 5px; }
        .status { font-size: 17px; color: #8e8e93; }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 320px;
            height: 320px;
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 24px;
            backdrop-filter: blur(10px);
        }
        .cell {
            background: var(--ios-gray);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }
        .cell:active { transform: scale(0.95); }
        .cell.x { color: var(--ios-blue); }
        .cell.o { color: #ff3b30; }

        .controls { margin-top: 40px; }
        .btn-reset { 
            background: var(--ios-blue); 
            color: #fff; 
            border: none; 
            padding: 12px 40px; 
            border-radius: 12px; 
            font-size: 17px; 
            font-weight: 600; 
            cursor: pointer; 
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">Tic Tac Toe</div>
        <div class="status" id="status">Your Turn (X)</div>
    </div>

    <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <div class="controls">
        <button class="btn-reset" onclick="resetGame()">Reset Game</button>
    </div>

    <script>
        let board = ['', '', '', '', '', '', '', '', ''];
        let gameActive = true;
        const cells = document.querySelectorAll('.cell');
        const statusText = document.getElementById('status');

        cells.forEach(cell => cell.addEventListener('click', handleCellClick));

        function handleCellClick(e) {
            const index = e.target.getAttribute('data-index');
            if (board[index] !== '' || !gameActive) return;

            makeMove(index, 'X');
            if (gameActive) {
                statusText.textContent = 'Computer is thinking...';
                setTimeout(computerMove, 500);
            }
        }

        function makeMove(index, player) {
            board[index] = player;
            cells[index].textContent = player;
            cells[index].classList.add(player.toLowerCase());
            checkResult();
        }

        function computerMove() {
            if (!gameActive) return;
            const available = board.map((v, i) => v === '' ? i : null).filter(v => v !== null);
            if (available.length > 0) {
                const random = available[Math.floor(Math.random() * available.length)];
                makeMove(random, 'O');
                if (gameActive) statusText.textContent = 'Your Turn (X)';
            }
        }

        function checkResult() {
            const winConditions = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8],
                [0, 3, 6], [1, 4, 7], [2, 5, 8],
                [0, 4, 8], [2, 4, 6]
            ];

            let roundWon = false;
            for (let condition of winConditions) {
                const [a, b, c] = condition;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    roundWon = true;
                    break;
                }
            }

            if (roundWon) {
                statusText.textContent = board.includes('X') && !board.includes('O') ? '' : (board.filter(x => x==='X').length > board.filter(x => x==='O').length ? 'You Won!' : 'Computer Won!');
                // Fix: check who actually won
                const lastPlayer = board.filter(x => x !== '').length % 2 === 0 ? 'O' : 'X';
                statusText.textContent = lastPlayer === 'X' ? 'You Won!' : 'Computer Won!';
                gameActive = false;
                return;
            }

            if (!board.includes('')) {
                statusText.textContent = "It's a Draw!";
                gameActive = false;
            }
        }

        function resetGame() {
            board = ['', '', '', '', '', '', '', '', ''];
            gameActive = true;
            statusText.textContent = 'Your Turn (X)';
            cells.forEach(cell => {
                cell.textContent = '';
                cell.classList.remove('x', 'o');
            });
        }
    </script>
    <script src="../shared-utils.js"></script>
    <script src="script.js"></script>
</body>
</html>
