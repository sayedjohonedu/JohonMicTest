<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Image Tools</title>
    <link rel="stylesheet" href="../shared-animations.css">
    <style>
        :root { --ios-blue: #007aff; --ios-bg: #000; --ios-gray: #8e8e93; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; }
        body { background: var(--ios-bg); color: #fff; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        
        .top-nav { 
            padding: 10px 16px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            z-index: 100;
        }
        .nav-btn { color: var(--ios-blue); text-decoration: none; font-size: 17px; font-weight: 500; }
        .nav-title { font-size: 17px; font-weight: 600; }

        .preview-area { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
            background: #111; 
            position: relative;
        }
        .image-placeholder { 
            width: 100%; 
            max-width: 320px; 
            aspect-ratio: 4/3; 
            background: #2c2c2e; 
            border-radius: 8px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
            border: 2px dashed #444;
            cursor: pointer;
        }
        .upload-icon { font-size: 40px; }
        .upload-text { font-size: 15px; font-weight: 600; color: var(--ios-blue); }

        .editor-controls { 
            background: rgba(28, 28, 30, 0.95); 
            backdrop-filter: blur(20px); 
            padding: 20px 0 40px; 
            border-top: 1px solid #333;
        }
        
        .adjustment-row { 
            display: flex; 
            gap: 20px; 
            padding: 0 20px 25px; 
            overflow-x: auto; 
            scrollbar-width: none;
        }
        .adjustment-row::-webkit-scrollbar { display: none; }
        .adj-item { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 8px; 
            min-width: 60px; 
            cursor: pointer;
        }
        .adj-icon { 
            width: 44px; 
            height: 44px; 
            border-radius: 50%; 
            background: #333; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 20px; 
            border: 2px solid transparent;
        }
        .adj-item.active .adj-icon { border-color: var(--ios-blue); background: #000; }
        .adj-label { font-size: 10px; font-weight: 600; color: #8e8e93; text-transform: uppercase; }

        .slider-wrap { padding: 0 40px 20px; text-align: center; }
        .slider { width: 100%; height: 2px; background: #444; appearance: none; outline: none; border-radius: 1px; }
        .slider::-webkit-slider-thumb { appearance: none; width: 20px; height: 20px; background: #fff; border-radius: 50%; cursor: pointer; }

        .tool-tabs { 
            display: flex; 
            justify-content: space-around; 
            border-top: 1px solid #333; 
            padding-top: 15px;
        }
        .tab-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #8e8e93; cursor: pointer; }
        .tab-btn.active { color: #fff; }
        .tab-icon { font-size: 24px; }
        .tab-label { font-size: 10px; font-weight: 700; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="top-nav">
        <a href="../index.html" class="nav-btn">Cancel</a>
        <div class="nav-title">Edit Photo</div>
        <a href="#" class="nav-btn" style="font-weight: 700;">Done</a>
    </div>

    <div class="preview-area">
        <div class="image-placeholder">
            <span class="upload-icon">🖼️</span>
            <span class="upload-text">Select Image</span>
        </div>
    </div>

    <div class="editor-controls">
        <div class="adjustment-row">
            <div class="adj-item active">
                <div class="adj-icon">✨</div>
                <div class="adj-label">Auto</div>
            </div>
            <div class="adj-item">
                <div class="adj-icon">🔆</div>
                <div class="adj-label">Expos</div>
            </div>
            <div class="adj-item">
                <div class="adj-icon">🌗</div>
                <div class="adj-label">Brill</div>
            </div>
            <div class="adj-item">
                <div class="adj-icon">💡</div>
                <div class="adj-label">Highl</div>
            </div>
            <div class="adj-item">
                <div class="adj-icon">🌑</div>
                <div class="adj-label">Shad</div>
            </div>
            <div class="adj-item">
                <div class="adj-icon">🌈</div>
                <div class="adj-label">Satur</div>
            </div>
        </div>

        <div class="slider-wrap">
            <input type="range" class="slider" min="-100" max="100" value="0">
        </div>

        <div class="tool-tabs">
            <div class="tab-btn active">
                <span class="tab-icon">🎛️</span>
                <span class="tab-label">Adjust</span>
            </div>
            <div class="tab-btn">
                <span class="tab-icon">🎭</span>
                <span class="tab-label">Filters</span>
            </div>
            <div class="tab-btn">
                <span class="tab-icon">📐</span>
                <span class="tab-label">Crop</span>
            </div>
        </div>
    </div>
    <script src="../shared-utils.js"></script>
    <script src="script.js"></script>
</body>
</html>
