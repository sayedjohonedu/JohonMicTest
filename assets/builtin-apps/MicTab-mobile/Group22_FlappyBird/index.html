<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Bird</title>
    <link rel="stylesheet" href="../shared-animations.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #gameCanvas { background: linear-gradient(#4ec0ca, #fff); border-radius: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.5); cursor: pointer; }
        .ui { position: absolute; top: 60px; text-align: center; color: #fff; pointer-events: none; }
        .score { font-size: 60px; font-weight: 800; text-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .message { font-size: 20px; font-weight: 600; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 20px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="ui">
        <div class="score" id="score">0</div>
        <div class="message" id="message">Tap to Start</div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const messageEl = document.getElementById('message');

        // Set size
        canvas.width = 360;
        canvas.height = 640;

        let bird = { x: 50, y: 320, w: 34, h: 24, v: 0, g: 0.25, jump: -5 };
        let pipes = [];
        let score = 0;
        let gameActive = false;
        let frame = 0;

        function reset() {
            bird.y = 320;
            bird.v = 0;
            pipes = [];
            score = 0;
            frame = 0;
            scoreEl.textContent = '0';
            messageEl.style.display = 'block';
            messageEl.textContent = 'Tap to Start';
        }

        function spawnPipe() {
            let gap = 150;
            let minHeight = 50;
            let h = Math.floor(Math.random() * (canvas.height - gap - minHeight * 2)) + minHeight;
            pipes.push({ x: canvas.width, y: h, w: 50, gap: gap });
        }

        function update() {
            if (!gameActive) return;

            bird.v += bird.g;
            bird.y += bird.v;

            if (frame % 100 === 0) spawnPipe();

            pipes.forEach((p, i) => {
                p.x -= 2;
                if (p.x + p.w < 0) {
                    pipes.splice(i, 1);
                    score++;
                    scoreEl.textContent = score;
                }

                // Collision
                if (bird.x + bird.w > p.x && bird.x < p.x + p.w) {
                    if (bird.y < p.y || bird.y + bird.h > p.y + p.gap) {
                        gameActive = false;
                        messageEl.style.display = 'block';
                        messageEl.textContent = 'Game Over - Tap to Reset';
                    }
                }
            });

            if (bird.y + bird.h > canvas.height || bird.y < 0) {
                gameActive = false;
                messageEl.style.display = 'block';
                messageEl.textContent = 'Game Over - Tap to Reset';
            }

            frame++;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Bird
            ctx.fillStyle = '#f8e71c';
            ctx.fillRect(bird.x, bird.y, bird.w, bird.h);
            ctx.strokeStyle = '#000';
            ctx.strokeRect(bird.x, bird.y, bird.w, bird.h);

            // Pipes
            ctx.fillStyle = '#73bf2e';
            pipes.forEach(p => {
                ctx.fillRect(p.x, 0, p.w, p.y);
                ctx.fillRect(p.x, p.y + p.gap, p.w, canvas.height);
                ctx.strokeRect(p.x, 0, p.w, p.y);
                ctx.strokeRect(p.x, p.y + p.gap, p.w, canvas.height);
            });

            update();
            requestAnimationFrame(draw);
        }

        canvas.addEventListener('mousedown', () => {
            if (!gameActive) {
                if (messageEl.textContent.includes('Game Over')) reset();
                gameActive = true;
                messageEl.style.display = 'none';
            }
            bird.v = bird.jump;
        });

        draw();
    </script>
    <script src="../shared-utils.js"></script>
    <script src="script.js"></script>
</body>
</html>
