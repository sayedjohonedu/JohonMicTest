<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculators</title>
    <link rel="stylesheet" href="../shared-animations.css">
    <style>
        :root { --ios-orange: #ff9f0a; --ios-bg: #000; --ios-gray: #333; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; }
        body { background: var(--ios-bg); color: #fff; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        
        .top-nav { 
            padding: 10px 16px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            z-index: 100;
        }
        .nav-btn { color: var(--ios-orange); text-decoration: none; font-size: 17px; font-weight: 400; }
        
        .calc-display { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-end; 
            align-items: flex-end; 
            padding: 20px 30px; 
            gap: 10px;
        }
        .history { font-size: 24px; color: #888; }
        .main-val { font-size: 80px; font-weight: 300; letter-spacing: -2px; }

        .keypad { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 12px; 
            padding: 20px; 
            margin-bottom: 20px;
        }
        .key { 
            aspect-ratio: 1; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 32px; 
            font-weight: 400; 
            cursor: pointer;
            transition: opacity 0.1s;
        }
        .key:active { opacity: 0.7; }
        
        .key-num { background: var(--ios-gray); color: #fff; }
        .key-op { background: var(--ios-orange); color: #fff; }
        .key-func { background: #a5a5a5; color: #000; }
        .key-zero { grid-column: span 2; aspect-ratio: auto; border-radius: 40px; justify-content: flex-start; padding-left: 30px; }

        /* Other Tools Tab */
        .tools-header { padding: 20px 16px 10px; border-top: 1px solid #333; }
        .section-title { font-size: 22px; font-weight: 700; }
        
        .tools-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .tool-card { 
            background: #1c1c1e; 
            border-radius: 14px; 
            padding: 16px; 
            display: flex; 
            flex-direction: column; 
            gap: 8px;
            cursor: pointer;
        }
        .tool-icon { font-size: 24px; }
        .tool-name { font-size: 15px; font-weight: 600; }
        .tool-desc { font-size: 12px; color: #8e8e93; }

        /* Detail Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 200;
            display: none;
            flex-direction: column;
            animation: slideUp 0.3s cubic-bezier(0.1, 0.7, 0.1, 1);
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-header { padding: 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .modal-body { padding: 20px; }
        
        input { width: 100%; padding: 15px; background: #1c1c1e; border: none; border-radius: 10px; color: #fff; font-size: 18px; margin-bottom: 15px; outline: none; }
        .result-display { background: #1c1c1e; padding: 20px; border-radius: 14px; margin-top: 20px; text-align: center; }
        .res-label { font-size: 14px; color: #8e8e93; margin-bottom: 5px; }
        .res-val { font-size: 32px; font-weight: 700; color: var(--ios-orange); }
    </style>
</head>
<body>
    <div class="top-nav">
        <a href="../index.html" class="nav-btn">‹ Back</a>
        <div style="font-weight: 600;">Calculator</div>
        <div style="width: 50px;"></div>
    </div>

    <div class="calc-display">
        <div class="history" id="history"></div>
        <div class="main-val" id="display">0</div>
    </div>

    <div class="keypad">
        <div class="key key-func" onclick="clearAll()">AC</div>
        <div class="key key-func" onclick="toggleSign()">+/-</div>
        <div class="key key-func" onclick="append('%')">%</div>
        <div class="key key-op" onclick="append('÷')">÷</div>

        <div class="key key-num" onclick="append('7')">7</div>
        <div class="key key-num" onclick="append('8')">8</div>
        <div class="key key-num" onclick="append('9')">9</div>
        <div class="key key-op" onclick="append('×')">×</div>

        <div class="key key-num" onclick="append('4')">4</div>
        <div class="key key-num" onclick="append('5')">5</div>
        <div class="key key-num" onclick="append('6')">6</div>
        <div class="key key-op" onclick="append('−')">−</div>

        <div class="key key-num" onclick="append('1')">1</div>
        <div class="key key-num" onclick="append('2')">2</div>
        <div class="key key-num" onclick="append('3')">3</div>
        <div class="key key-op" onclick="append('+')">+</div>

        <div class="key key-num key-zero" onclick="append('0')">0</div>
        <div class="key key-num" onclick="append('.')">.</div>
        <div class="key key-op" onclick="calculate()">=</div>
    </div>

    <div class="tools-header">
        <div class="section-title">Specialized Calculators</div>
    </div>

    <div class="tools-grid">
        <div class="tool-card" onclick="openModal('BMI')">
            <span class="tool-icon">⚖️</span>
            <span class="tool-name">BMI Calc</span>
            <span class="tool-desc">Calculate your health index.</span>
        </div>
        <div class="tool-card" onclick="openModal('Age')">
            <span class="tool-icon">🎂</span>
            <span class="tool-name">Age Calc</span>
            <span class="tool-desc">Exact age in years/days.</span>
        </div>
        <div class="tool-card" onclick="openModal('ROI')">
            <span class="tool-icon">📈</span>
            <span class="tool-name">ROI Calc</span>
            <span class="tool-desc">Investment return analysis.</span>
        </div>
        <div class="tool-card" onclick="openModal('Split')">
            <span class="tool-icon">🧾</span>
            <span class="tool-name">Tip & Split</span>
            <span class="tool-desc">Quick bill calculations.</span>
        </div>
    </div>

    <div class="modal" id="toolModal">
        <div class="modal-header">
            <a href="javascript:void(0)" class="nav-btn" onclick="closeModal()">Done</a>
            <div id="modalTitle" style="font-weight: 600;">BMI Calculator</div>
            <div style="width: 50px;"></div>
        </div>
        <div class="modal-body">
            <div id="modalContent">
                <!-- BMI Example -->
                <input type="number" placeholder="Weight (kg)" id="bmiW">
                <input type="number" placeholder="Height (cm)" id="bmiH">
                <div class="result-display">
                    <div class="res-label">Your BMI</div>
                    <div class="res-val" id="bmiRes">0.0</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentDisplay = '0';
        let history = '';
        const operators = ['+', '−', '×', '÷', '%'];

        function updateDisplay() {
            document.getElementById('display').textContent = currentDisplay;
            document.getElementById('history').textContent = history;
        }

        function append(n) {
            const lastChar = currentDisplay.slice(-1);
            
            // If the last character is an operator and we click another operator, replace it
            if (operators.includes(lastChar) && operators.includes(n)) {
                currentDisplay = currentDisplay.slice(0, -1) + n;
            } else {
                if (currentDisplay === '0' && !operators.includes(n) && n !== '.') {
                    currentDisplay = n;
                } else {
                    currentDisplay += n;
                }
            }
            updateDisplay();
        }

        function clearAll() {
            currentDisplay = '0';
            history = '';
            updateDisplay();
        }

        function toggleSign() {
            if (currentDisplay === '0') return;
            if (currentDisplay.startsWith('-')) {
                currentDisplay = currentDisplay.slice(1);
            } else {
                currentDisplay = '-' + currentDisplay;
            }
            updateDisplay();
        }

        function calculate() {
            try {
                history = currentDisplay + ' =';
                let expression = currentDisplay
                    .replace(/×/g, '*')
                    .replace(/÷/g, '/')
                    .replace(/−/g, '-')
                    .replace(/%/g, '/100');
                
                let result = eval(expression);
                // Handle precision issues
                if (!Number.isInteger(result)) {
                    result = parseFloat(result.toFixed(8));
                }
                currentDisplay = result.toString();
            } catch(e) {
                currentDisplay = 'Error';
            }
            updateDisplay();
        }

        function openModal(type) {
            document.getElementById('toolModal').style.display = 'flex';
            document.getElementById('modalTitle').textContent = type + ' Calculator';
        }
        function closeModal() {
            document.getElementById('toolModal').style.display = 'none';
        }
    </script>
    <script src="../shared-utils.js"></script>
    <script src="script.js"></script>
</body>
</html>
