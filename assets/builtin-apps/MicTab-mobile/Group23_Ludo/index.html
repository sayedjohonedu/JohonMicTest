<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ludo</title>
    <link rel="stylesheet" href="../shared-animations.css">
    <style>
        :root { --ios-blue: #007aff; --ios-red: #ff3b30; --ios-green: #34c759; --ios-yellow: #ffcc00; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background: #f2f2f7; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        .header { margin-bottom: 20px; text-align: center; }
        .title { font-size: 24px; font-weight: 700; color: #1c1c1e; }
        .status { font-size: 15px; color: #8e8e93; margin-top: 4px; }

        .ludo-board {
            width: 350px;
            height: 350px;
            background: #fff;
            border: 4px solid #1c1c1e;
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .home { grid-column: span 6; grid-row: span 6; display: flex; align-items: center; justify-content: center; position: relative; }
        .home.red { background: var(--ios-red); }
        .home.blue { background: var(--ios-blue); }
        .home.green { background: var(--ios-green); }
        .home.yellow { background: var(--ios-yellow); }
        
        .home-inner { width: 70%; height: 70%; background: #fff; border-radius: 10px; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; padding: 10%; gap: 10%; }
        .piece-slot { border-radius: 50%; background: #eee; }
        .home.red .piece-slot { background: rgba(255, 59, 48, 0.2); }
        
        .middle { grid-column: span 3; grid-row: span 3; background: #eee; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        .dice-area { margin-top: 30px; display: flex; align-items: center; gap: 20px; }
        .dice { width: 60px; height: 60px; background: #fff; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 32px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.1s; }
        .dice:active { transform: scale(0.9); }
        .roll-btn { background: var(--ios-blue); color: #fff; border: none; padding: 12px 24px; border-radius: 12px; font-size: 17px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">Ludo Pro</div>
        <div class="status" id="status">Red's Turn</div>
    </div>

    <div class="ludo-board">
        <!-- Red Home -->
        <div class="home red" style="grid-area: 1 / 1 / 7 / 7;">
            <div class="home-inner">
                <div class="piece-slot"></div><div class="piece-slot"></div>
                <div class="piece-slot"></div><div class="piece-slot"></div>
            </div>
        </div>
        <!-- Green Home -->
        <div class="home green" style="grid-area: 1 / 10 / 7 / 16;">
            <div class="home-inner">
                <div class="piece-slot"></div><div class="piece-slot"></div>
                <div class="piece-slot"></div><div class="piece-slot"></div>
            </div>
        </div>
        <!-- Blue Home -->
        <div class="home blue" style="grid-area: 10 / 1 / 16 / 7;">
            <div class="home-inner">
                <div class="piece-slot"></div><div class="piece-slot"></div>
                <div class="piece-slot"></div><div class="piece-slot"></div>
            </div>
        </div>
        <!-- Yellow Home -->
        <div class="home yellow" style="grid-area: 10 / 10 / 16 / 16;">
            <div class="home-inner">
                <div class="piece-slot"></div><div class="piece-slot"></div>
                <div class="piece-slot"></div><div class="piece-slot"></div>
            </div>
        </div>
        <!-- Path Squares (Simplified visual) -->
        <div class="middle" style="grid-area: 7 / 7 / 10 / 10;">🏁</div>
    </div>

    <div class="dice-area">
        <div class="dice" id="dice">🎲</div>
        <button class="roll-btn" onclick="rollDice()">Roll Dice</button>
    </div>

    <script>
        const diceIcons = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
        let currentPlayer = 'Red';

        function rollDice() {
            const dice = document.getElementById('dice');
            const status = document.getElementById('status');
            
            dice.style.animation = 'none';
            void dice.offsetWidth; // trigger reflow
            dice.style.animation = 'roll 0.5s ease-out';
            
            const roll = Math.floor(Math.random() * 6);
            dice.textContent = diceIcons[roll];
            
            status.textContent = `${currentPlayer} rolled a ${roll + 1}! Move your piece.`;
            
            // Simulation: next player after 1.5s
            setTimeout(() => {
                currentPlayer = currentPlayer === 'Red' ? 'Green' : (currentPlayer === 'Green' ? 'Blue' : (currentPlayer === 'Blue' ? 'Yellow' : 'Red'));
                status.textContent = `${currentPlayer}'s Turn`;
            }, 1500);
        }
    </script>
    <style>
        @keyframes roll {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <script src="../shared-utils.js"></script>
    <script src="script.js"></script>
</body>
</html>
