<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calendar</title>
    <link rel="stylesheet" href="../shared-animations.css">
    <style>
        :root { --ios-red: #ff3b30; --ios-bg: #fff; --ios-gray: #8e8e93; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; }
        body { background: var(--ios-bg); color: #000; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        
        .top-nav { 
            padding: 10px 16px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            z-index: 100;
            border-bottom: 1px solid #efeff4;
        }
        .nav-btn { color: var(--ios-red); text-decoration: none; font-size: 17px; font-weight: 400; }
        .nav-center { font-weight: 600; font-size: 17px; }

        .calendar-header { padding: 20px 16px 10px; }
        .month-year { font-size: 28px; font-weight: 700; color: var(--ios-red); display: flex; align-items: center; gap: 8px; }
        .month-year span { color: #000; font-weight: 400; }

        .weekday-labels { display: grid; grid-template-columns: repeat(7, 1fr); padding: 10px; text-align: center; border-bottom: 1px solid #efeff4; }
        .weekday { font-size: 11px; font-weight: 600; color: var(--ios-gray); }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); padding: 10px; text-align: center; }
        .day { 
            aspect-ratio: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            font-size: 20px; 
            position: relative; 
            cursor: pointer;
            border-radius: 50%;
            transition: background 0.2s;
        }
        .day:active { background: #f2f2f7; }
        .day.other-month { color: #ccc; }
        .day.today { background: var(--ios-red); color: white; font-weight: 600; }
        .day.has-event::after { 
            content: ""; 
            width: 4px; 
            height: 4px; 
            background: var(--ios-gray); 
            border-radius: 50%; 
            position: absolute; 
            bottom: 6px; 
        }
        .day.today.has-event::after { background: white; }

        .event-section { 
            flex: 1; 
            background: #fff; 
            border-top: 1px solid #efeff4;
            padding-top: 20px;
        }
        .section-title { padding: 0 16px 15px; font-size: 13px; font-weight: 600; color: var(--ios-gray); text-transform: uppercase; }
        
        .event-list { display: flex; flex-direction: column; }
        .event-item { 
            display: flex; 
            padding: 12px 16px; 
            gap: 15px; 
            align-items: flex-start;
            border-bottom: 1px solid #efeff4;
        }
        .event-time { 
            width: 55px; 
            text-align: right; 
            font-size: 12px; 
            font-weight: 600; 
            color: var(--ios-gray); 
            padding-top: 2px;
            white-space: nowrap;
        }
        .event-card { 
            flex: 1; 
            padding: 10px 12px; 
            background: #fdfdfd; 
            border-radius: 8px; 
            border-left: 4px solid var(--ios-red);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .event-name { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
        .event-location { font-size: 13px; color: var(--ios-gray); }

        /* Add Event Modal */
        .modal {
            position: fixed;
            top: 100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            z-index: 200;
            transition: top 0.4s cubic-bezier(0.1, 0.7, 0.1, 1);
            display: flex;
            flex-direction: column;
            border-radius: 12px 12px 0 0;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.1);
        }
        .modal.active { top: 40px; }
        .modal-header { padding: 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .modal-body { padding: 20px; flex: 1; }
        .input-group { margin-bottom: 20px; }
        .input-label { font-size: 13px; font-weight: 600; color: var(--ios-gray); margin-bottom: 8px; display: block; }
        input { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 8px; font-size: 17px; outline: none; }
    </style>
</head>
<body>
    <div class="top-nav">
        <a href="../index.html" class="nav-btn">‹ Home</a>
        <div class="nav-center">Calendar</div>
        <a href="javascript:void(0)" class="nav-btn" style="font-size: 24px; font-weight: 300;" onclick="toggleModal(true)">+</a>
    </div>

    <div class="calendar-header">
        <div class="month-year">April <span>2026</span></div>
    </div>

    <div class="weekday-labels">
        <div class="weekday">S</div><div class="weekday">M</div><div class="weekday">T</div><div class="weekday">W</div><div class="weekday">T</div><div class="weekday">F</div><div class="weekday">S</div>
    </div>

    <div class="calendar-grid">
        <div class="day other-month">29</div><div class="day other-month">30</div><div class="day other-month">31</div><div class="day">1</div><div class="day">2</div><div class="day">3</div><div class="day">4</div>
        <div class="day">5</div><div class="day has-event">6</div><div class="day">7</div><div class="day">8</div><div class="day">9</div><div class="day">10</div><div class="day">11</div>
        <div class="day">12</div><div class="day">13</div><div class="day">14</div><div class="day">15</div><div class="day">16</div><div class="day">17</div><div class="day">18</div>
        <div class="day">19</div><div class="day">20</div><div class="day">21</div><div class="day">22</div><div class="day">23</div><div class="day">24</div><div class="day">25</div>
        <div class="day">26</div><div class="day">27</div><div class="day">28</div><div class="day today has-event">29</div><div class="day">30</div><div class="day other-month">1</div><div class="day other-month">2</div>
    </div>

    <div class="event-section">
        <div class="section-title">Wednesday, April 29</div>
        <div class="event-list">
            <div class="event-item">
                <div class="event-time">ALL-DAY</div>
                <div class="event-card" style="border-left-color: #34c759;">
                    <div class="event-name">MicTab Launch Day</div>
                    <div class="event-location">World Wide</div>
                </div>
            </div>
            <div class="event-item">
                <div class="event-time">4:00 PM</div>
                <div class="event-card">
                    <div class="event-name">Product Review</div>
                    <div class="event-location">Conference Room B</div>
                </div>
            </div>
            <div class="event-item">
                <div class="event-time">6:30 PM</div>
                <div class="event-card" style="border-left-color: #af52de;">
                    <div class="event-name">Dinner with Team</div>
                    <div class="event-location">Blue Bottle Cafe</div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="addEventModal">
        <div class="modal-header">
            <a href="javascript:void(0)" class="nav-btn" onclick="toggleModal(false)">Cancel</a>
            <div class="nav-center">New Event</div>
            <a href="javascript:void(0)" class="nav-btn" style="font-weight: 600;" onclick="toggleModal(false)">Add</a>
        </div>
        <div class="modal-body">
            <div class="input-group">
                <label class="input-label">TITLE</label>
                <input type="text" placeholder="Event Title">
            </div>
            <div class="input-group">
                <label class="input-label">LOCATION</label>
                <input type="text" placeholder="Location">
            </div>
            <div class="input-group">
                <label class="input-label">STARTS</label>
                <input type="datetime-local" value="2026-04-29T16:00">
            </div>
            <div class="input-group">
                <label class="input-label">ENDS</label>
                <input type="datetime-local" value="2026-04-29T17:00">
            </div>
        </div>
    </div>

    <script>
        function toggleModal(show) {
            const modal = document.getElementById('addEventModal');
            if (show) modal.classList.add('active');
            else modal.classList.remove('active');
        }
    </script>
    <script src="../shared-utils.js"></script>
    <script src="script.js"></script>
</body>
</html>
