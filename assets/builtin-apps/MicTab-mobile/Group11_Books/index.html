<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Books</title>
    <link rel="stylesheet" href="../shared-animations.css">
    <style>
        :root { --ios-blue: #007aff; --ios-bg: #fff; --ios-gray: #8e8e93; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; }
        body { background: var(--ios-bg); color: #000; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        
        .top-nav { 
            padding: 10px 16px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            z-index: 100;
        }
        .nav-btn { color: var(--ios-blue); text-decoration: none; font-size: 17px; font-weight: 400; }
        .nav-profile { width: 32px; height: 32px; border-radius: 50%; background: #eee; display: flex; align-items: center; justify-content: center; font-size: 18px; }

        .header { padding: 10px 16px 12px; }
        .header-title { font-size: 34px; font-weight: 700; }

        /* Carousel */
        .carousel-container { padding: 0 0 20px 0; }
        .carousel-scroll { 
            display: flex; 
            gap: 20px; 
            overflow-x: auto; 
            padding: 10px 20px 20px; 
            scrollbar-width: none;
            scroll-snap-type: x mandatory;
        }
        .carousel-scroll::-webkit-scrollbar { display: none; }
        
        .book-card { 
            min-width: 200px; 
            scroll-snap-align: center;
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            cursor: pointer;
        }
        .book-cover-large { 
            width: 200px; 
            height: 300px; 
            background: #f2f2f7; 
            border-radius: 8px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 80px;
            border: 1px solid rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .book-card:active .book-cover-large { transform: scale(0.98); }
        
        .progress-wrap { height: 4px; background: #eee; border-radius: 2px; overflow: hidden; margin-top: 4px; }
        .progress-fill { height: 100%; background: var(--ios-blue); }
        
        .book-info-large { text-align: left; }
        .book-title { font-size: 18px; font-weight: 700; margin-bottom: 2px; }
        .book-author { font-size: 14px; color: var(--ios-gray); }

        /* List Section */
        .section-header { padding: 20px 16px 10px; display: flex; justify-content: space-between; align-items: baseline; }
        .section-title { font-size: 22px; font-weight: 700; }
        .section-link { color: var(--ios-blue); font-size: 15px; text-decoration: none; }

        .library-list { padding: 0 16px 40px; }
        .library-item { 
            display: flex; 
            gap: 15px; 
            padding: 12px 0; 
            border-bottom: 1px solid #efeff4;
            align-items: center;
        }
        .book-cover-small { 
            width: 50px; 
            height: 75px; 
            background: #f2f2f7; 
            border-radius: 4px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 24px;
            border: 1px solid #eee;
        }
        .library-info { flex: 1; }
        .library-title { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
        .library-author { font-size: 13px; color: var(--ios-gray); }

        /* Tab Bar */
        .tab-bar {
            background: rgba(249, 249, 249, 0.94);
            backdrop-filter: blur(20px);
            border-top: 1px solid #d1d1d1;
            display: flex;
            justify-content: space-around;
            padding: 10px 0 24px;
            position: sticky;
            bottom: 0;
            z-index: 100;
        }
        .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--ios-gray); text-decoration: none; min-width: 60px; }
        .tab-item.active { color: #000; }
        .tab-icon { font-size: 24px; }
        .tab-label { font-size: 10px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="top-nav">
        <a href="../index.html" class="nav-btn">‹ Back</a>
        <div class="nav-profile">👤</div>
    </div>

    <div class="header">
        <div class="header-title">Reading Now</div>
    </div>

    <div class="carousel-container">
        <div class="carousel-scroll">
            <div class="book-card">
                <div class="book-cover-large" style="background:#e1f5fe;">📖</div>
                <div class="book-info-large">
                    <div class="book-title">The Great Gatsby</div>
                    <div class="book-author">F. Scott Fitzgerald</div>
                    <div class="progress-wrap"><div class="progress-fill" style="width: 65%;"></div></div>
                </div>
            </div>
            <div class="book-card">
                <div class="book-cover-large" style="background:#fff9c4;">📔</div>
                <div class="book-info-large">
                    <div class="book-title">Moby Dick</div>
                    <div class="book-author">Herman Melville</div>
                    <div class="progress-wrap"><div class="progress-fill" style="width: 12%;"></div></div>
                </div>
            </div>
            <div class="book-card">
                <div class="book-cover-large" style="background:#f8bbd0;">📓</div>
                <div class="book-info-large">
                    <div class="book-title">1984</div>
                    <div class="book-author">George Orwell</div>
                    <div class="progress-wrap"><div class="progress-fill" style="width: 45%;"></div></div>
                </div>
            </div>
        </div>
    </div>

    <div class="section-header">
        <div class="section-title">Want to Read</div>
        <a href="#" class="section-link">See All</a>
    </div>

    <div class="library-list">
        <div class="library-item">
            <div class="book-cover-small" style="background:#e8f5e9;">📒</div>
            <div class="library-info">
                <div class="library-title">Pride and Prejudice</div>
                <div class="library-author">Jane Austen</div>
            </div>
            <span style="color:var(--ios-gray);">⋮</span>
        </div>
        <div class="library-item">
            <div class="book-cover-small" style="background:#ede7f6;">📙</div>
            <div class="library-info">
                <div class="library-title">War and Peace</div>
                <div class="library-author">Leo Tolstoy</div>
            </div>
            <span style="color:var(--ios-gray);">⋮</span>
        </div>
        <div class="library-item">
            <div class="book-cover-small" style="background:#fbe9e7;">📘</div>
            <div class="library-info">
                <div class="library-title">The Odyssey</div>
                <div class="library-author">Homer</div>
            </div>
            <span style="color:var(--ios-gray);">⋮</span>
        </div>
    </div>

    <div class="tab-bar">
        <a href="#" class="tab-item active">
            <span class="tab-icon">📖</span>
            <span class="tab-label">Reading Now</span>
        </a>
        <a href="#" class="tab-item">
            <span class="tab-icon">📚</span>
            <span class="tab-label">Library</span>
        </a>
        <a href="#" class="tab-item">
            <span class="tab-icon">🛍️</span>
            <span class="tab-label">Book Store</span>
        </a>
        <a href="#" class="tab-item">
            <span class="tab-icon">🔍</span>
            <span class="tab-label">Search</span>
        </a>
    </div>
    <script src="../shared-utils.js"></script>
    <script src="script.js"></script>
</body>
</html>
